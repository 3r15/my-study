<title>정보처리산업기사 1과목 학습앱</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--card2:#273449;--line:#334155;--txt:#e2e8f0;--mut:#94a3b8;
--acc:#38bdf8;--good:#34d399;--warn:#fbbf24;--bad:#f87171;--pri:#818cf8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--txt);line-height:1.6;-webkit-tap-highlight-color:transparent;}
.wrap{max-width:960px;margin:0 auto;padding:16px;}
header{text-align:center;padding:18px 0 8px;}
header h1{font-size:1.5rem;}
header p{color:var(--mut);font-size:.85rem;margin-top:4px;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:16px 0;}
.tab{padding:9px 16px;border:1px solid var(--line);background:var(--card);color:var(--txt);
border-radius:999px;cursor:pointer;font-size:.9rem;transition:.15s;}
.tab.active{background:var(--acc);color:#06283d;border-color:var(--acc);font-weight:700;}
.panel{display:none;} .panel.active{display:block;}
.filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.chip{padding:5px 11px;border:1px solid var(--line);background:var(--card);color:var(--mut);
border-radius:8px;cursor:pointer;font-size:.78rem;}
.chip.active{background:var(--pri);color:#0b1020;border-color:var(--pri);font-weight:700;}
.fc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:30px 24px;
min-height:230px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;
text-align:center;transition:.15s;}
.fc:hover{border-color:var(--acc);}
.fc .tag{font-size:.72rem;color:var(--acc);margin-bottom:12px;}
.fc .q{font-size:1.15rem;font-weight:700;white-space:pre-wrap;}
.fc .a{font-size:1rem;color:var(--good);white-space:pre-wrap;text-align:left;}
.fc .hint{color:var(--mut);font-size:.75rem;margin-top:16px;}
.fcbar{display:flex;justify-content:space-between;align-items:center;margin:14px 0;gap:8px;}
.btn{padding:9px 14px;border:1px solid var(--line);background:var(--card2);color:var(--txt);
border-radius:10px;cursor:pointer;font-size:.85rem;}
.btn:hover{border-color:var(--acc);}
.btn.good{background:var(--good);color:#062c1c;border:none;font-weight:700;}
.btn.bad{background:var(--bad);color:#3a0b0b;border:none;font-weight:700;}
.prog{color:var(--mut);font-size:.85rem;}
.q-item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
.q-type{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:6px;background:var(--card2);color:var(--acc);margin-bottom:8px;}
.q-text{font-weight:700;margin-bottom:12px;}
.opt{display:block;width:100%;text-align:left;padding:10px 12px;margin:6px 0;border:1px solid var(--line);
background:var(--card2);color:var(--txt);border-radius:9px;cursor:pointer;font-size:.9rem;}
.opt:hover{border-color:var(--acc);}
.opt.correct{background:var(--good);color:#062c1c;border:none;}
.opt.wrong{background:var(--bad);color:#3a0b0b;border:none;}
.oxrow{display:flex;gap:10px;}
.oxrow .opt{text-align:center;}
.blankin{padding:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt);
border-radius:9px;font-size:.9rem;width:60%;}
.exp{margin-top:10px;padding:10px;border-left:3px solid var(--acc);background:var(--card2);
border-radius:6px;font-size:.85rem;color:var(--mut);display:none;}
.exp.show{display:block;}
.note{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
.note h3{color:var(--acc);font-size:1rem;margin-bottom:8px;}
.mn-key{font-size:1.3rem;font-weight:800;color:var(--warn);letter-spacing:1px;}
table{width:100%;border-collapse:collapse;margin-top:8px;font-size:.85rem;}
th,td{border:1px solid var(--line);padding:8px 10px;text-align:left;}
th{background:var(--card2);color:var(--acc);}
.steps{list-style:none;counter-reset:s;}
.steps li{counter-increment:s;padding:7px 0 7px 34px;position:relative;border-bottom:1px dashed var(--line);font-size:.88rem;}
.steps li::before{content:counter(s);position:absolute;left:0;top:7px;width:22px;height:22px;
background:var(--pri);color:#0b1020;border-radius:50%;text-align:center;font-weight:700;font-size:.78rem;line-height:22px;}
.ans-box{margin-top:10px;padding:10px;background:var(--card2);border-radius:8px;color:var(--good);font-weight:600;font-size:.88rem;}
.dash-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dash-name{width:165px;font-size:.85rem;flex-shrink:0;}
.bar{flex:1;height:22px;background:var(--card2);border-radius:6px;overflow:hidden;position:relative;}
.bar>span{display:block;height:100%;transition:width .4s;}
.bar em{position:absolute;right:8px;top:0;line-height:22px;font-size:.72rem;font-style:normal;color:var(--txt);}
.summary{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;}
.legend{font-size:.78rem;color:var(--mut);margin-top:12px;}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 4px 0 10px;vertical-align:middle;}
.reset{font-size:.75rem;color:var(--mut);text-decoration:underline;cursor:pointer;background:none;border:none;}
.tablescroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.io-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
@media(max-width:600px){
  .wrap{padding:12px;}
  header h1{font-size:1.2rem;}
  .tabs{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
  .tab{flex:0 0 auto;padding:10px 14px;}
  .dash-name{width:104px;font-size:.78rem;}
  .fc .q{font-size:1.02rem;} .fc{padding:24px 16px;min-height:200px;}
  .btn{padding:11px 12px;font-size:.82rem;flex:1;text-align:center;}
  .fcbar{flex-wrap:wrap;} .blankin{width:100%;margin-bottom:8px;} .oxrow{flex-direction:column;}
  table{font-size:.8rem;min-width:420px;} .chip{padding:7px 10px;}
}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>📘 정보처리산업기사 1과목</h1>

  <div class="summary" style="margin-top:16px;">
    <div style="font-weight:700;margin-bottom:6px;">🔄 진도 이동 (PC ↔ 휴대폰)</div>
    <div style="font-size:.82rem;color:var(--mut);margin-bottom:10px;">진도는 기기마다 따로 저장됩니다. PC에서 <b>내보내기</b>로 파일을 받아 휴대폰으로 옮긴 뒤 <b>불러오기</b>하면 동일한 진도로 이어서 학습할 수 있습니다.</div>
    <div class="io-bar">
      <button class="btn" id="ioExport">⬇ 진도 내보내기</button>

    </div>
  </div>
  <p style="margin-top:14px;"><button class="reset" id="resetAll">⚠ 모든 진도 초기화</button></p>
</div>

<script>
const DATA = {"themes": {"A": "운영체제 기초", "B": "CPU 스케줄링·교착상태", "C": "기억장치 관리", "D": "디스크·파일 시스템", "E": "UNIX", "F": "데이터 통신·오류제어", "G": "네트워크·프로토콜", "H": "SW공학·개발 모형", "I": "구조적 분석·모델링", "J": "객체지향·디자인 패턴", "K": "소프트웨어 테스트", "L": "UI·형상관리·빌드"}, "cards": [{"num": 1, "th": "A", "title": "운영체제의 개요", "front": "운영체제의 두 가지 핵심 역할은?", "back": "① 컴퓨터 시스템의 자원을 효율적으로 관리한다.\n② 사용자가 컴퓨터를 편리하고 효과적으로 사용하도록 환경을 제공한다."}, {"num": 2, "th": "A", "title": "운영체제의 목적", "front": "운영체제의 목적 4가지는? (성능 평가 기준)", "back": "처리 능력(Throughput) 향상 / 반환 시간(Turn Around Time) 단축 / 사용 가능도(Availability) 향상 / 신뢰도(Reliability) 향상\n암기: 처(↑)·반(↓)·사(↑)·신(↑)"}, {"num": 3, "th": "A", "title": "운영체제의 기능", "front": "운영체제의 주요 기능은?", "back": "① 프로세서·기억장치·입출력장치·파일/정보 등 자원 관리\n② 자원 스케줄링 기능 제공\n③ 사용자와 시스템 간 인터페이스 제공\n④ 데이터 관리 및 자원 공유 기능 제공"}, {"num": 4, "th": "A", "title": "운영체제 운용 기법", "front": "실시간 / 분산 처리 / 다중 프로그래밍 / 다중 처리 / 임베디드 시스템을 구분하면?", "back": "실시간: 데이터 생길 때마다 즉시 처리 / 분산 처리: 분산된 여러 컴퓨터를 연결해 작업 분담 / 다중 프로그래밍: 한 CPU로 여러 프로그램 동시 처리 / 다중 처리: 한 컴퓨터에 여러 CPU 설치 / 임베디드: 마이크로프로세서에 특정 기능 응용프로그램 탑재"}, {"num": 5, "th": "A", "title": "운영체제 운용 기법의 발달 과정", "front": "1세대~4세대 운영체제 운용 기법의 발달 순서는?", "back": "1세대 일괄 처리 → 2세대(다중 프로그래밍·다중 처리·시분할·실시간) → 3세대 다중 모드 → 4세대 분산 처리 시스템"}, {"num": 6, "th": "A", "title": "프로세스의 정의", "front": "프로세스의 정의(대표 표현)는?", "back": "PCB를 가진 프로그램 / 주기억장치에 저장된 프로그램 / 프로세서가 할당되는 실체 / 프로시저가 활동중인 것 / 비동기적 행위를 일으키는 주체"}, {"num": 7, "th": "A", "title": "프로세스 상태 전이", "front": "프로세스의 상태 6단계는?", "back": "제출(Submit) → 접수(Hold) → 준비(Ready) → 실행(Run) → 대기/보류/블록(Wait/Block) → 종료(Terminated)\n암기 두문자: 제·접·준·실·대·종"}, {"num": 8, "th": "B", "title": "스케줄링 - FCFS(FIFO)", "front": "FCFS의 정의와 예제(P1=20,P2=4,P3=6, 도착순 P1→P2→P3)의 평균값은?", "back": "정의: 준비상태 큐 도착 순서대로 차례로 CPU 할당(비선점).\n평균 실행시간=10, 평균 대기시간≈14.67(=44/3), 평균 반환시간≈24.67(=74/3)\n(대기: 0,20,24 / 반환: 20,24,30)"}, {"num": 9, "th": "B", "title": "스케줄링 - SJF", "front": "SJF의 정의와 예제(P1:20/도착0, P2:7/도착1, P3:4/도착2)의 평균값은?", "back": "정의: 실행 시간이 가장 짧은 프로세스에 먼저 CPU 할당.\n실행 순서 P1→P3→P2. 평균 실행시간≈10.33, 평균 대기시간≈13.67(=41/3), 평균 반환시간=24(=72/3)"}, {"num": 10, "th": "B", "title": "스케줄링 - RR(Round Robin)", "front": "RR(라운드 로빈)의 특징 3가지는?", "back": "① 시분할 시스템을 위해 고안됨 ② FCFS를 선점 형태로 변형한 기법 ③ 할당 시간(타임 슬라이스)이 클수록 FCFS와 같아짐"}, {"num": 11, "th": "B", "title": "교착상태 발생의 필요충분조건", "front": "교착상태(Deadlock)가 발생하기 위한 4가지 필요충분조건은?", "back": "상호 배제(Mutual Exclusion) / 점유와 대기(Hold and Wait) / 비선점(Non-preemption) / 환형 대기(Circular Wait)\n암기 두문자: 상·점·비·환"}, {"num": 12, "th": "C", "title": "기억장치의 배치 전략", "front": "최초 적합·최적 적합·최악 적합의 차이는?", "back": "최초 적합(First Fit): 첫 번째 분할 영역에 배치 / 최적 적합(Best Fit): 단편화를 가장 작게 남기는 영역 / 최악 적합(Worst Fit): 단편화를 가장 많이 남기는 영역"}, {"num": 13, "th": "C", "title": "가상기억장치 - 페이징 기법", "front": "페이징 기법의 특징은?", "back": "프로그램과 주기억장치를 동일한 크기로 나눠 적재·실행. 나눈 단위를 '페이지'라 함. → 내부 단편화 발생 가능"}, {"num": 14, "th": "C", "title": "가상기억장치 - 세그먼테이션 기법", "front": "세그먼테이션 기법의 특징은?", "back": "프로그램을 다양한(논리적) 크기 단위로 나눠 적재·실행. 나눈 단위를 '세그먼트'라 함. → 외부 단편화 발생 가능"}, {"num": 15, "th": "C", "title": "주요 페이지 교체 알고리즘", "front": "FIFO / LRU / NUR 페이지 교체 알고리즘의 차이는?", "back": "FIFO: 가장 먼저 들어와 가장 오래 있던 페이지 교체 / LRU: 최근에 가장 오랫동안 사용하지 않은 페이지 교체 / NUR: 최근에 사용하지 않은 페이지 교체(참조 비트·변형 비트 사용)"}, {"num": 16, "th": "D", "title": "주요 디스크 스케줄링", "front": "헤드 53, 큐(98,183,37,122,14,124,65,67)일 때 FCFS와 SSTF의 총 이동거리는?", "back": "FCFS: 도착 순서대로 서비스 → 총 이동거리 640\nSSTF: 탐색 거리가 가장 짧은 트랙부터 서비스 → 총 이동거리 236"}, {"num": 17, "th": "D", "title": "직접 파일(Direct File)", "front": "직접 파일의 특징은?", "back": "레코드를 임의의 물리적 저장 공간에 기록. 해싱 함수를 이용해 물리적 상대주소를 계산한다."}, {"num": 18, "th": "D", "title": "2단계 디렉터리", "front": "2단계 디렉터리의 구조는?", "back": "중앙에 마스터 파일 디렉터리(MFD), 그 아래 사용자별 파일 디렉터리(UFD)가 있는 2계층 구조. MFD는 UFD를 관리하고, UFD는 사용자별 파일을 관리한다."}, {"num": 19, "th": "D", "title": "권한(자격) 리스트", "front": "권한(자격) 리스트란?", "back": "영역을 중심으로 권한 리스트를 구성한 것. 각 영역의 권한 리스트는 객체와 그 객체에 허용된 조작 리스트로 구성된다."}, {"num": 20, "th": "E", "title": "UNIX의 특징", "front": "UNIX의 주요 특징은?", "back": "대부분 C 언어로 작성되어 이식성이 높음 / 장치·프로세스 간 호환성 높음 / 다중 사용자(Multi-User)·다중 작업(Multi-Tasking) 지원 / 트리 구조 파일 시스템"}, {"num": 21, "th": "E", "title": "UNIX - 커널(Kernel)의 기능", "front": "UNIX 커널의 기능 4가지는?", "back": "프로세스(CPU 스케줄링) 관리 / 기억장치 관리 / 파일 시스템 관리 / 입·출력 관리"}, {"num": 22, "th": "E", "title": "UNIX - 쉘(Shell)", "front": "UNIX 쉘(Shell)의 역할은?", "back": "사용자 명령어를 인식해 프로그램을 호출·수행하는 '명령어 해석기'. 시스템과 사용자 간 인터페이스를 담당한다."}, {"num": 23, "th": "E", "title": "UNIX의 주요 명령어", "front": "cat / chmod / chown / exec / fork / ls 명령어의 기능은?", "back": "cat: 파일 내용 화면 표시 / chmod: 파일 보호 모드(사용 허가) 설정 / chown: 소유자 변경 / exec: 새 프로세스 수행 / fork: 새 프로세스 생성 / ls: 디렉터리 내 파일 목록 확인"}, {"num": 24, "th": "F", "title": "비동기식 전송", "front": "비동기식 전송의 특징은?", "back": "시작 비트와 정지 비트를 붙여 전송. 문자와 문자 사이의 휴지 시간이 불규칙하다."}, {"num": 25, "th": "F", "title": "해밍 코드(Hamming Code)", "front": "해밍 코드의 특징과 패리티 비트 위치는?", "back": "수신 측에서 오류 비트를 검출 후 직접 수정하는 방식. 1비트 오류만 수정 가능.\n[보충] 패리티 비트는 2의 거듭제곱 위치(1,2,4,8…)에 배치된다."}, {"num": 26, "th": "F", "title": "통신 프로토콜", "front": "통신 프로토콜의 정의는?", "back": "서로 다른 기기들 간의 데이터 교환을 정확하고 원활하게 수행하도록 표준화한 통신 규약."}, {"num": 27, "th": "F", "title": "OSI 7계층 (1→7)", "front": "OSI 7계층을 1계층부터 순서대로 나열하면?", "back": "물리 → 데이터 링크 → 네트워크 → 전송 → 세션 → 표현 → 응용\n암기 두문자: 물·데·네·전·세·표·응"}, {"num": 28, "th": "F", "title": "OSI 7계층의 주요 계층", "front": "데이터 링크·네트워크·전송 계층의 역할은?", "back": "데이터 링크: 신뢰성 있는 정보 전송 위해 시스템 간 연결 설정·유지·종료 / 네트워크: 네트워크 연결 관리, 데이터 교환·중계 / 전송: 종단 시스템 간 투명한 데이터 전송"}, {"num": 29, "th": "F", "title": "X.25의 계층 구조", "front": "X.25의 3계층 구조는?", "back": "물리 계층 / 프레임 계층 / 패킷 계층"}, {"num": 30, "th": "G", "title": "TCP/IP 계층별 주요 프로토콜", "front": "TCP/IP 4계층별 대표 프로토콜은?", "back": "응용: TELNET, FTP, SMTP, SNMP / 전송: TCP, UDP / 인터넷: IP, ICMP, IGMP, ARP, RARP / 네트워크 액세스: Ethernet, IEEE 802, HDLC, X.25, RS-232C"}, {"num": 31, "th": "G", "title": "경로 제어(라우팅) 프로토콜", "front": "거리 벡터 방식과 링크 상태 방식의 프로토콜은?", "back": "종류: RIP, OSPF, EGP, BGP, EIGRP\n거리 벡터 방식: RIP, EIGRP, BGP / 링크 상태 방식: OSPF"}, {"num": 32, "th": "G", "title": "패킷 교환 방식", "front": "패킷 교환 방식의 특징은?", "back": "메시지를 일정 길이 패킷으로 잘라 전송. 데이터 전송에 적합 / 장애 시 다른 경로로 우회 가능 / 대량 데이터 전송 시 전송 지연 증가"}, {"num": 33, "th": "G", "title": "고속 이더넷", "front": "고속 이더넷(100BASE-T)의 특징은?", "back": "이더넷의 고속 버전(100BASE-T). CSMA/CD 사용, UTP 케이블로 100Mbps 전송."}, {"num": 34, "th": "G", "title": "IPv6 주소", "front": "IPv6 주소의 구성과 특징은?", "back": "16비트씩 8부분, 총 128비트. 각 부분을 16진수로 표현하고 콜론(:)으로 구분. 인증성·기밀성·무결성 지원, 확장성·융통성·연동성 우수."}, {"num": 35, "th": "H", "title": "소프트웨어 공학의 기본 원칙", "front": "소프트웨어 공학의 기본 원칙 3가지는?", "back": "현대적 프로그래밍 기술을 계속 적용 / 품질이 유지되도록 지속적으로 검증 / 개발 관련 사항·결과에 대한 명확한 기록 유지"}, {"num": 36, "th": "H", "title": "폭포수 모형", "front": "폭포수 모형의 특징은?", "back": "이전 단계로 돌아갈 수 없다는 전제로 각 단계를 매듭짓고 다음 단계 진행 / 보헴이 제시한 고전적 생명주기 모형 / 요구사항 반영이 어려움"}, {"num": 37, "th": "H", "title": "나선형 모형", "front": "나선형 모형의 반복 과정 4단계는?", "back": "점진적으로 완벽한 최종 SW를 개발. '계획 수립 → 위험 분석 → 개발 및 검증 → 고객 평가'가 반복 수행됨"}, {"num": 38, "th": "H", "title": "애자일 개발 4가지 핵심 가치", "front": "애자일 4가지 핵심 가치는?", "back": "① 프로세스·도구보다 개인과 상호작용 ② 방대한 문서보다 실행되는 SW ③ 계약 협상보다 고객과 협업 ④ 계획을 따르기보다 변화에 반응"}, {"num": 39, "th": "H", "title": "XP의 핵심 가치", "front": "XP(eXtreme Programming)의 핵심 가치 5가지는?", "back": "의사소통(Communication) / 단순성(Simplicity) / 용기(Courage) / 존중(Respect) / 피드백(Feedback)\n암기 두문자: 의·단·용·존·피"}, {"num": 40, "th": "I", "title": "자료 흐름도(DFD)의 구성 요소", "front": "자료 흐름도의 4가지 구성 요소는?", "back": "프로세스(Process) / 자료 흐름(Data Flow) / 자료 저장소(Data Store) / 단말(Terminator)"}, {"num": 41, "th": "I", "title": "자료 사전(DD)의 표기 기호", "front": "자료 사전의 표기 기호(=, +, (), [|], {}, **)의 의미는?", "back": "= : 정의 / + : 연결 / ( ) : 생략 / [ | ] : 선택 / { } : 반복 / ** : 설명"}, {"num": 42, "th": "I", "title": "UML", "front": "UML의 정의와 구성 요소는?", "back": "개발자-고객-개발자 상호 간 의사소통을 위해 표준화한 대표적 객체지향 모델링 언어. 구성 요소: 사물(Things), 관계(Relationships), 다이어그램(Diagram)"}, {"num": 43, "th": "I", "title": "UML의 주요 관계", "front": "일반화·의존·실체화 관계의 의미는?", "back": "일반화(Generalization): 사물이 더 일반적/구체적인지 표현 / 의존(Dependency): 짧은 시간 동안만 연관 유지 / 실체화(Realization): 기능으로 서로 그룹화할 수 있는 관계"}, {"num": 44, "th": "I", "title": "소프트웨어 아키텍처 뷰의 종류", "front": "소프트웨어 아키텍처 뷰 5가지는?", "back": "유스케이스(Use Case) 뷰 / 논리적(Logical) 뷰 / 구현(Implementation) 뷰 / 프로세스(Process) 뷰 / 배포(Deployment) 뷰"}, {"num": 45, "th": "J", "title": "파이프-필터 패턴", "front": "파이프-필터 패턴이란?", "back": "각 단계를 필터 컴포넌트로 캡슐화하여 파이프를 통해 데이터를 전송하는 패턴. 서브 시스템이 입력을 받아 처리 후 다음 서브 시스템으로 넘기는 과정을 반복."}, {"num": 46, "th": "J", "title": "메소드(Method)", "front": "메소드란?", "back": "객체가 메시지를 받아 실행해야 할 때 객체의 구체적인 연산을 정의한 것."}, {"num": 47, "th": "J", "title": "클래스(Class)", "front": "클래스와 인스턴스의 관계는?", "back": "클래스: 공통된 속성과 연산을 갖는 객체의 집합. 클래스에 속한 각각의 객체를 인스턴스(Instance)라 한다."}, {"num": 48, "th": "J", "title": "추상 클래스", "front": "추상 클래스의 특징은?", "back": "구체 클래스에서 구현하려는 기능들의 공통점만 모아 추상화한 클래스. 인스턴스 생성이 불가능하다."}, {"num": 49, "th": "J", "title": "캡슐화(Encapsulation)", "front": "캡슐화의 정의와 장점은?", "back": "데이터와 데이터를 처리하는 함수를 하나로 묶는 것. 외부 모듈 변경으로 인한 파급 효과가 적고, 재사용이 용이하다."}, {"num": 50, "th": "J", "title": "상속(Inheritance)", "front": "상속이란?", "back": "이미 정의된 상위 클래스의 모든 속성과 연산을 하위 클래스가 물려받는 것."}, {"num": 51, "th": "J", "title": "럼바우(Rumbaugh)의 분석 기법", "front": "럼바우 분석의 3가지 모델링은?", "back": "객체(Object) 모델링=정보 모델링, 객체 다이어그램 / 동적(Dynamic) 모델링=상태 다이어그램 / 기능(Functional) 모델링=자료 흐름도\n암기 두문자: 객·동·기"}, {"num": 52, "th": "J", "title": "생성 패턴 - 빌더(Builder)", "front": "빌더 패턴의 특징은?", "back": "인스턴스를 건축하듯 조합하여 객체를 생성. 객체의 생성 과정과 표현 방법을 분리한다."}, {"num": 53, "th": "J", "title": "생성 패턴 - 프로토타입(Prototype)", "front": "프로토타입 패턴의 특징은?", "back": "원본 객체를 복제하는 방법으로 객체를 생성. 생성 비용이 큰 경우 주로 이용."}, {"num": 54, "th": "J", "title": "생성 패턴 - 싱글톤(Singleton)", "front": "싱글톤 패턴의 특징은?", "back": "생성된 객체를 어디서든 참조 가능하지만 여러 프로세스가 동시에 참조할 수는 없음. 불필요한 메모리 낭비를 최소화."}, {"num": 55, "th": "J", "title": "구조 패턴 - 데코레이터(Decorator)", "front": "데코레이터 패턴의 특징은?", "back": "객체 간 결합으로 능동적으로 기능을 확장하는 패턴. 객체에 부가 기능을 추가하기 위해 다른 객체들을 덧붙이는 방식."}, {"num": 56, "th": "K", "title": "화이트박스 테스트", "front": "화이트박스 테스트란?", "back": "원시 코드의 논리적인 모든 경로를 테스트해 테스트 케이스를 설계. 모든 문장을 한 번 이상 실행함으로써 수행됨."}, {"num": 57, "th": "K", "title": "화이트박스 테스트 - 루프 const THKEYS = Object.keys(DATA.themes);
const LS='jbcsai_g1_v1';
let store = JSON.parse(localStorage.getItem(LS) || '{}');
store.cards = store.cards || {};   // num -> true(안다)/false(모름)
store.quiz = store.quiz || {};     // qid -> true/false
function save(){localStorage.setItem(LS, JSON.stringify(store));}

// ---------- tabs ----------
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById(t.dataset.p).classList.add('active');
  if(t.dataset.p==='dash') renderDash();

// ---------- flashcards ----------
let fcTheme='ALL', fcList=[], fcIdx=0, flipped=false;
function buildFilter(el,onPick,active){
  el.innerHTML='';
  const all=mk('전체','ALL'); el.appendChild(all);
  THKEYS.forEach(k=>el.appendChild(mk(k+'. '+DATA.themes[k],k)));
  function mk(label,val){const b=document.createElement('button');b.className='chip'+(val===active?' active':'');
    b.textContent=label;b.onclick=()=>onPick(val);return b;}
}
function loadFc(){
  fcList = DATA.cards.filter(c=>fcTheme==='ALL'||c.th===fcTheme);
  fcIdx=0; flipped=false; renderFc();
}
function renderFc(){
  buildFilter(document.getElementById('fcFilter'),v=>{fcTheme=v;loadFc();},fcTheme);
  const c=fcList[fcIdx]; const card=document.getElementById('fcCard');
  if(!c){card.innerHTML='카드가 없습니다.';return;}
  const known=store.cards[c.num];
  const status = known===true?'<span style="color:var(--good)">✓ 안다</span>':known===false?'<span style="color:var(--bad)">✗ 모름</span>':'미평가';
  if(!flipped){
    card.innerHTML=`<div class="tag">[${String(c.num).padStart(3,'0')}] ${c.th}. ${DATA.themes[c.th]} · ${c.title} · ${status}</div>
      <div class="q">${esc(c.front)}</div><div class="hint">카드를 누르면 정답이 보입니다</div>`;
  }else{
    card.innerHTML=`<div class="tag">[${String(c.num).padStart(3,'0')}] ${c.title}</div><div class="a">${esc(c.back)}</div>`;
  }
  document.getElementById('fcProg').textContent=`${fcIdx+1} / ${fcList.length} 장`;
}
function flip(){flipped=!flipped;renderFc();}
function nextCard(){if(fcIdx<fcList.length-1){fcIdx++;flipped=false;renderFc();}}
function prevCard(){if(fcIdx>0){fcIdx--;flipped=false;renderFc();}}
function markCard(ok){const c=fcList[fcIdx];if(!c)return;store.cards[c.num]=ok;save();nextCard();renderFc();}
document.getElementById('fcShuffle').onclick=()=>{for(let i=fcList.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[fcList[i],fcList[j]]=[fcList[j],fcList[i]];}fcIdx=0;flipped=false;renderFc();};

// ---------- quiz ----------
let qTheme='ALL';
function qid(i){return 'q'+i;}
function renderQuiz(){
  buildFilter(document.getElementById('qFilter'),v=>{qTheme=v;renderQuiz();},qTheme);
  const list=document.getElementById('qList'); list.innerHTML='';
  let answered=0,correct=0;
  DATA.quiz.forEach((q,i)=>{
    if(qTheme!=='ALL'&&q.th!==qTheme)return;
    const id=qid(i); const prev=store.quiz[id];
    if(prev!==undefined){answered++;if(prev)correct++;}
    const d=document.createElement('div'); d.className='q-item';
    let inner=`<span class="q-type">${q.th}. ${DATA.themes[q.th]} · ${q.type}</span>
      <div class="q-text">${esc(q.q)}</div>`;
    if(q.type==='객관식'){
      inner+='<div>'+q.opts.map(o=>`<button class="opt" data-v="${esc(o)}">${esc(o)}</button>`).join('')+'</div>';
    }else if(q.type==='OX'){
      inner+=`<div class="oxrow"><button class="opt" data-v="O">⭕ O (맞다)</button><button class="opt" data-v="X">❌ X (틀리다)</button></div>`;
    }else{
      inner+=`<div><input class="blankin" placeholder="정답 입력 후 Enter"><button class="btn" style="margin-left:8px">확인</button></div>`;
    }
    inner+=`<div class="exp">정답: <b>${esc(q.ans)}</b> — ${esc(q.exp)}</div>`;
    d.innerHTML=inner;
    const exp=d.querySelector('.exp');
    function grade(val){
      const ok = val.trim().toLowerCase()===q.ans.trim().toLowerCase();
      store.quiz[id]=ok; save();
      exp.classList.add('show');
      if(q.type==='빈칸'){exp.innerHTML='판정: '+(ok?'<b style="color:var(--good)">정답 ✓</b>':'<b style="color:var(--bad)">오답 ✗</b>')+` · 정답: <b>${esc(q.ans)}</b> — ${esc(q.exp)}`;}
      d.querySelectorAll('.opt').forEach(b=>{
        if(b.dataset.v===q.ans)b.classList.add('correct');
        else if(b.dataset.v===val&&!ok)b.classList.add('wrong');
        b.disabled=true;
      });
      renderQuizProg();
    }
    d.querySelectorAll('.opt').forEach(b=>b.onclick=()=>grade(b.dataset.v));
    const inp=d.querySelector('.blankin');
    if(inp){const btn=d.querySelector('.btn');
      btn.onclick=()=>grade(inp.value);
      inp.onkeydown=e=>{if(e.key==='Enter')grade(inp.value);};}
    if(prev!==undefined){ // already answered: reveal
      exp.classList.add('show');
      d.querySelectorAll('.opt').forEach(b=>{if(b.dataset.v===q.ans)b.classList.add('correct');b.disabled=true;});
    }
    list.appendChild(d);
  });
  renderQuizProg();
}
function renderQuizProg(){
  let answered=0,correct=0,total=0;
  DATA.quiz.forEach((q,i)=>{if(qTheme!=='ALL'&&q.th!==qTheme)return;total++;
    const p=store.quiz[qid(i)];if(p!==undefined){answered++;if(p)correct++;}});
  document.getElementById('qProg').textContent=`풀이 ${answered}/${total} · 정답 ${correct} (${answered?Math.round(correct/answered*100):0}%)`;
}
document.getElementById('qReset').onclick=()=>{
  DATA.quiz.forEach((q,i)=>{if(qTheme==='ALL'||q.th===qTheme)delete store.quiz[qid(i)];});
  save();renderQuiz();
};

// ---------- dashboard ----------
function renderDash(){
  // per-theme card progress
  const cardStat={},quizStat={};
  THKEYS.forEach(k=>{cardStat[k]={known:0,tot:0};quizStat[k]={correct:0,ans:0,tot:0};});
  DATA.cards.forEach(c=>{cardStat[c.th].tot++;if(store.cards[c.num]===true)cardStat[c.th].known++;});
  DATA.quiz.forEach((q,i)=>{quizStat[q.th].tot++;const p=store.quiz[qid(i)];if(p!==undefined){quizStat[q.th].ans++;if(p)quizStat[q.th].correct++;}});
  // summary
  let totK=0,totC=0,totAns=0,totCor=0,totQ=0;
  THKEYS.forEach(k=>{totK+=cardStat[k].known;totC+=cardStat[k].tot;totAns+=quizStat[k].ans;totCor+=quizStat[k].correct;totQ+=quizStat[k].tot;});
  const weak=THKEYS.filter(k=>{const a=quizStat[k];const acc=a.ans?a.correct/a.ans:0;const cp=cardStat[k].known/cardStat[k].tot;
    return (a.ans>0&&acc<0.5)||cp<0.5;}).map(k=>k+'. '+DATA.themes[k]);
  document.getElementById('dashSummary').innerHTML=
    `<div style="font-size:1.05rem;font-weight:700;margin-bottom:6px">📊 전체 현황</div>
     <div style="font-size:.9rem">플래시카드 숙지: <b>${totK}/${totC}</b> (${Math.round(totK/totC*100)}%) ·
     퀴즈 정답률: <b>${totAns?Math.round(totCor/totAns*100):0}%</b> (${totAns}/${totQ} 풀이)</div>
     <div style="margin-top:8px;font-size:.88rem;color:var(--bad)">⚠ 우선 복습 주제: ${weak.length?weak.join(', '):'<span style="color:var(--good)">없음 — 잘하고 있어요!</span>'}</div>`;
  // bars
  function color(p){return p>=0.8?'var(--good)':p>=0.5?'var(--warn)':'var(--bad)';}
  let hc='';
  THKEYS.forEach(k=>{const s=cardStat[k];const p=s.tot?s.known/s.tot:0;
    hc+=`<div class="dash-row"><div class="dash-name">${k}. ${DATA.themes[k]}</div>
      <div class="bar"><span style="width:${Math.round(p*100)}%;background:${color(p)}"></span><em>${s.known}/${s.tot}</em></div></div>`;});
  document.getElementById('dashCards').innerHTML=hc;
  let hq='';
  THKEYS.forEach(k=>{const s=quizStat[k];const p=s.ans?s.correct/s.ans:0;
    const label=s.ans?`${s.correct}/${s.ans} (${Math.round(p*100)}%)`:'미응시';
    hq+=`<div class="dash-row"><div class="dash-name">${k}. ${DATA.themes[k]}</div>
      <div class="bar"><span style="width:${s.ans?Math.round(p*100):0}%;background:${s.ans?color(p):'var(--line)'}"></span><em>${label}</em></div></div>`;});
  document.getElementById('dashQuiz').innerHTML=hq;
}
document.getElementById('resetAll').onclick=()=>{if(confirm('모든 학습 진도를 초기화할까요?')){store={cards:{},quiz:{}};save();loadFc();renderQuiz();renderDash();}};

// ---------- util ----------
document.getElementById('ioExport').onclick=function(){
  var blob=new Blob([JSON.stringify(store)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  var d=new Date();var stamp=d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2);
  a.download='정처산기1과목_진도_'+stamp+'.json';a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
};
document.getElementById('ioImportBtn').onclick=function(){document.getElementById('ioImport').click();};
document.getElementById('ioImport').onchange=function(e){
  var file=e.target.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(){try{var obj=JSON.parse(rd.result);
    if(!obj||typeof obj!=='object')throw 0;
    var mode=confirm('확인 = 불러온 진도로 [교체]\n취소 = 기존 진도와 [병합]');
    if(mode){store={cards:obj.cards||{},quiz:obj.quiz||{}};}
    else{store.cards=Object.assign({},store.cards,obj.cards||{});store.quiz=Object.assign({},store.quiz,obj.quiz||{});}
    save();loadFc();renderQuiz();renderDash();alert('진도를 불러왔습니다 ✓');
  }catch(err){alert('올바른 진도 파일이 아닙니다.');}};
  rd.readAsText(file);e.target.value='';
};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

// init
loadFc(); renderQuiz(); renderNotes();
</script>
