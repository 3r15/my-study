<title>정보처리산업기사 학습앱</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--card2:#273449;--line:#334155;--txt:#e2e8f0;--mut:#94a3b8;
--acc:#38bdf8;--good:#34d399;--warn:#fbbf24;--bad:#f87171;--pri:#818cf8;}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--txt);line-height:1.6;
-webkit-tap-highlight-color:transparent;padding-bottom:env(safe-area-inset-bottom);}
.wrap{max-width:960px;margin:0 auto;padding:16px;padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));}
.tablescroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
header{text-align:center;padding:14px 0 6px;}
header h1{font-size:1.4rem;}
header p{color:var(--mut);font-size:.8rem;margin-top:4px;}
.gwabar{display:flex;gap:8px;justify-content:center;margin:12px 0 6px;flex-wrap:wrap;}
.gwa{padding:9px 16px;border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:12px;cursor:pointer;font-size:.9rem;font-weight:600;}
.gwa.active{background:var(--pri);color:#0b1020;border-color:var(--pri);}
.gwaname{text-align:center;color:var(--acc);font-size:.85rem;margin-bottom:6px;font-weight:600;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:12px 0;}
.tab{padding:9px 16px;border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:999px;cursor:pointer;font-size:.9rem;transition:.15s;}
.tab.active{background:var(--acc);color:#06283d;border-color:var(--acc);font-weight:700;}
.panel{display:none;} .panel.active{display:block;}
.filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.chip{padding:5px 11px;border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:8px;cursor:pointer;font-size:.78rem;}
.chip.active{background:var(--pri);color:#0b1020;border-color:var(--pri);font-weight:700;}
.fc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:30px 24px;min-height:230px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;text-align:center;transition:.15s;}
.fc:hover{border-color:var(--acc);}
.fc .tag{font-size:.72rem;color:var(--acc);margin-bottom:12px;}
.fc .q{font-size:1.15rem;font-weight:700;white-space:pre-wrap;}
.fc .a{font-size:1rem;color:var(--good);white-space:pre-wrap;text-align:left;}
.fc .hint{color:var(--mut);font-size:.75rem;margin-top:16px;}
.fcbar{display:flex;justify-content:space-between;align-items:center;margin:14px 0;gap:8px;}
.btn{padding:9px 14px;border:1px solid var(--line);background:var(--card2);color:var(--txt);border-radius:10px;cursor:pointer;font-size:.85rem;}
.btn:hover{border-color:var(--acc);}
.btn.good{background:var(--good);color:#062c1c;border:none;font-weight:700;}
.btn.bad{background:var(--bad);color:#3a0b0b;border:none;font-weight:700;}
.prog{color:var(--mut);font-size:.85rem;}
.q-item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
.q-type{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:6px;background:var(--card2);color:var(--acc);margin-bottom:8px;}
.q-text{font-weight:700;margin-bottom:12px;}
.opt{display:block;width:100%;text-align:left;padding:10px 12px;margin:6px 0;border:1px solid var(--line);background:var(--card2);color:var(--txt);border-radius:9px;cursor:pointer;font-size:.9rem;}
.opt:hover{border-color:var(--acc);}
.opt.correct{background:var(--good);color:#062c1c;border:none;}
.opt.wrong{background:var(--bad);color:#3a0b0b;border:none;}
.oxrow{display:flex;gap:10px;}
.oxrow .opt{text-align:center;}
.blankin{padding:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt);border-radius:9px;font-size:.9rem;width:60%;}
.exp{margin-top:10px;padding:10px;border-left:3px solid var(--acc);background:var(--card2);border-radius:6px;font-size:.85rem;color:var(--mut);display:none;}
.exp.show{display:block;}
.note{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
.note h3{color:var(--acc);font-size:1rem;margin-bottom:8px;}
.mn-key{font-size:1.3rem;font-weight:800;color:var(--warn);letter-spacing:1px;}
table{width:100%;border-collapse:collapse;margin-top:8px;font-size:.85rem;}
th,td{border:1px solid var(--line);padding:8px 10px;text-align:left;}
th{background:var(--card2);color:var(--acc);}
.steps{list-style:none;counter-reset:s;}
.steps li{counter-increment:s;padding:7px 0 7px 34px;position:relative;border-bottom:1px dashed var(--line);font-size:.88rem;}
.steps li::before{content:counter(s);position:absolute;left:0;top:7px;width:22px;height:22px;background:var(--pri);color:#0b1020;border-radius:50%;text-align:center;font-weight:700;font-size:.78rem;line-height:22px;}
.ans-box{margin-top:10px;padding:10px;background:var(--card2);border-radius:8px;color:var(--good);font-weight:600;font-size:.88rem;}
.dash-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dash-name{width:180px;font-size:.85rem;flex-shrink:0;}
.bar{flex:1;height:22px;background:var(--card2);border-radius:6px;overflow:hidden;position:relative;}
.bar>span{display:block;height:100%;transition:width .4s;}
.bar em{position:absolute;right:8px;top:0;line-height:22px;font-size:.72rem;font-style:normal;color:var(--txt);}
.summary{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;}
.legend{font-size:.78rem;color:var(--mut);margin-top:12px;}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 4px 0 10px;vertical-align:middle;}
.reset{font-size:.75rem;color:var(--mut);text-decoration:underline;cursor:pointer;background:none;border:none;}
.io-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.ov{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.ovcard{flex:1;min-width:150px;background:var(--card2);border-radius:10px;padding:10px 12px;font-size:.82rem;}
@media(max-width:600px){
  .wrap{padding:12px;} header h1{font-size:1.12rem;}
  .tabs{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;-webkit-overflow-scrolling:touch;padding-bottom:4px;}

<script>
const DATA = {"subjects": {"1": "1과목 · 정보시스템 기반 기술", "2": "2과목 · 프로그래밍 언어 활용", "3": "3과목 · 데이터베이스 활용"}, "themes": {"1A": "운영체제 기초", "1B": "CPU 스케줄링·교착상태", "1C": "기억장치 관리", "1D": "디스크·파일 시스템", "1E": "UNIX", "1F": "데이터 통신·오류제어", "1G": "네트워크·프로토콜", "1H": "SW공학·개발 모형", "1I": "구조적 분석·모델링", "1J": "객체지향·디자인 패턴", "1K": "소프트웨어 테스트", "1L": "UI·형상관리·빌드", "2A": "데이터 타입·변수·상수", "2B": "연산자", "2C": "입·출력 함수", "2D": "제어문", "2E": "배열·포인터", "2F": "함수·Python", "2G": "HTML·JavaScript", "2H": "객체지향·스크립트 언어", "2I": "라이브러리·예외·프레임워크", "2J": "모듈화·재사용·보안", "3A": "자료구조 기초", "3B": "수식 표기법", "3C": "정렬·해싱", "3D": "데이터베이스 설계", "3E": "관계형 모델 용어", "3F": "키(Key)", "3G": "관계대수·관계해석", "3H": "정규화", "3I": "뷰·카탈로그·트랜잭션", "3J": "SQL - DDL·DML·DCL", "3K": "SQL - 조회·함수·조인", "3L": "절차형 SQL·성능"}, "cards": [{"num": 1, "g": "1", "th": "1A", "title": "운영체제의 개요", "front": "운영체제의 두 가지 핵심 역할은?", "back": "① 컴퓨터 시스템의 자원을 효율적으로 관리한다.\n② 사용자가 컴퓨터를 편리하고 효과적으로 사용하도록 환경을 제공한다."}, {"num": 2, "g": "1", "th": "1A", "title": "운영체제의 목적", "front": "운영체제의 목적 4가지는? (성능 평가 기준)", "back": "처리 능력(Throughput) 향상 / 반환 시간(Turn Around Time) 단축 / 사용 가능도(Availability) 향상 / 신뢰도(Reliability) 향상\n암기: 처(↑)·반(↓)·사(↑)·신(↑)"}, {"num": 3, "g": "1", "th": "1A", "title": "운영체제의 기능", "front": "운영체제의 주요 기능은?", "back": "① 프로세서·기억장치·입출력장치·파일/정보 등 자원 관리\n② 자원 스케줄링 기능 제공\n③ 사용자와 시스템 간 인터페이스 제공\n④ 데이터 관리 및 자원 공유 기능 제공"}, {"num": 4, "g": "1", "th": "1A", "title": "운영체제 운용 기법", "front": "실시간 / 분산 처리 / 다중 프로그래밍 / 다중 처리 / 임베디드 시스템을 구분하면?", "back": "실시간: 데이터 생길 때마다 즉시 처리 / 분산 처리: 분산된 여러 컴퓨터를 연결해 작업 분담 / 다중 프로그래밍: 한 CPU로 여러 프로그램 동시 처리 / 다중 처리: 한 컴퓨터에 여러 CPU 설치 / 임베디드: 마이크로프로세서에 특정 기능 응용프로그램 탑재"}, {"num": 5, "g": "1", "th": "1A", "title": "운영체제 운용 기법의 발달 과정", "front": "1세대~4세대 운영체제 운용 기법의 발달 순서는?", "back": "1세대 일괄 처리 → 2세대(다중 프로그래밍·다중 처리·시분할·실시간) → 3세대 다중 모드 → 4세대 분산 처리 시스템"}, {"num": 6, "g": "1", "th": "1A", "title": "프로세스의 정의", "front": "프로세스의 정의(대표 표현)는?", "back": "PCB를 가진 프로그램 / 주기억장치에 저장된 프로그램 / 프로세서가 할당되는 실체 / 프로시저가 활동중인 것 / 비동기적 행위를 일으키는 주체"}, {"num": 7, "g": "1", "th": "1A", "title": "프로세스 상태 전이", "front": "프로세스의 상태 6단계는?", "back": "제출(Submit) → 접수(Hold) → 준비(Ready) → 실행(Run) → 대기/보류/블록(Wait/Block) → 종료(Terminated)\n암기 두문자: 제·접·준·실·대·종"}, {"num": 8, "g": "1", "th": "1B", "title": "스케줄링 - FCFS(FIFO)", "front": "FCFS의 정의와 예제(P1=20,P2=4,P3=6, 도착순 P1→P2→P3)의 평균값은?", "back": "정의: 준비상태 큐 도착 순서대로 차례로 CPU 할당(비선점).\n평균 실행시간=10, 평균 대기시간≈14.67(=44/3), 평균 반환시간≈24.67(=74/3)\n(대기: 0,20,24 / 반환: 20,24,30)"}, {"num": 9, "g": "1", "th": "1B", "title": "스케줄링 - SJF", "front": "SJF의 정의와 예제(P1:20/도착0, P2:7/도착1, P3:4/도착2)의 평균값은?", "back": "정의: 실행 시간이 가장 짧은 프로세스에 먼저 CPU 할당.\n실행 순서 P1→P3→P2. 평균 실행시간≈10.33, 평균 대기시간≈13.67(=41/3), 평균 반환시간=24(=72/3)"}, {"num": 10, "g": "1", "th": "1B", "title": "스케줄링 - RR(Round Robin)", "front": "RR(라운드 로빈)의 특징 3가지는?", "back": "① 시분할 시스템을 위해 고안됨 ② FCFS를 선점 형태로 변형한 기법 ③ 할당 시간(타임 슬라이스)이 클수록 FCFS와 같아짐"}, {"num": 11, "g": "1", "th": "1B", "title": "교착상태 발생의 필요충분조건", "front": "교착상태(Deadlock)가 발생하기 위한 4가지 필요충분조건은?", "back": "상호 배제(Mutual Exclusion) / 점유와 대기(Hold and Wait) / 비선점(Non-preemption) / 환형 대기(Circular Wait)\n암기 두문자: 상·점·비·환"}, {"num": 12, "g": "1", "th": "1C", "title": "기억장치의 배치 전략", "front": "최초 적합·최적 적합·최악 적합의 차이는?", "back": "최초 적합(First Fit): 첫 번째 분할 영역에 배치 / 최적 적합(Best Fit): 단편화를 가장 작게 남기는 영역 / 최악 적합(Worst Fit): 단편화를 가장 많이 남기는 영역"}, {"num": 13, "g": "1", "th": "1C", "title": "가상기억장치 - 페이징 기법", "front": "페이징 기법의 특징은?", "back": "프로그램과 주기억장치를 동일한 크기로 나눠 적재·실행. 나눈 단위를 '페이지'라 함. → 내부 단편화 발생 가능"}, {"num": 14, "g": "1", "th": "1C", "title": "가상기억장치 - 세그먼테이션 기법", "front": "세그먼테이션 기법의 특징은?", "back": "프로그램을 다양한(논리적) 크기 단위로 나눠 적재·실행. 나눈 단위를 '세그먼트'라 함. → 외부 단편화 발생 가능"}, {"num": 15, "g": "1", "th": "1C", "title": "주요 페이지 교체 알고리즘", "front": "FIFO / LRU / NUR 페이지 교체 알고리즘의 차이는?", "back": "FIFO: 가장 먼저 들어와 가장 오래 있던 페이지 교체 / LRU: 최근에 가장 오랫동안 사용하지 않은 페이지 교체 / NUR: 최근에 사용하지 않은 페이지 교체(참조 비트·변형 비트 사용)"}, {"num": 16, "g": "1", "th": "1D", "title": "주요 디스크 스케줄링", "front": "헤드 53, 큐(98,183,37,122,14,124,65,67)일 때 FCFS와 SSTF의 총 이동거리는?", "back": "FCFS: 도착 순서대로 서비스 → 총 이동거리 640\nSSTF: 탐색 거리가 가장 짧은 트랙부터 서비스 → 총 이동거리 236"}, {"num": 17, "g": "1", "th": "1D", "title": "직접 파일(Direct File)", "front": "직접 파일의 특징은?", "back": "레코드를 임의의 물리적 저장 공간에 기록. 해싱 함수를 이용해 물리적 상대주소를 계산한다."}, {"num": 18, "g": "1", "th": "1D", "title": "2단계 디렉터리", "front": "2단계 디렉터리의 구조는?", "back": "중앙에 마스터 파일 디렉터리(MFD), 그 아래 사용자별 파일 디렉터리(UFD)가 있는 2계층 구조. MFD는 UFD를 관리하고, UFD는 사용자별 파일을 관리한다."}, {"num": 19, "g": "1", "th": "1D", "title": "권한(자격) 리스트", "front": "권한(자격) 리스트란?", "back": "영역을 중심으로 권한 리스트를 구성한 것. 각 영역의 권한 리스트는 객체와 그 객체에 허용된 조작 리스트로 구성된다."}, {"num": 20, "g": "1", "th": "1E", "title": "UNIX의 특징", "front": "UNIX의 주요 특징은?", "back": "대부분 C 언어로 작성되어 이식성이 높음 / 장치·프로세스 간 호환성 높음 / 다중 사용자(Multi-User)·다중 작업(Multi-Tasking) 지원 / 트리 구조 파일 시스템"}, {"num": 21, "g": "1", "th": "1E", "title": "UNIX - 커널(Kernel)의 기능", "front": "UNIX 커널의 기능 4가지는?", "back": "프로세스(CPU 스케줄링) 관리 / 기억장치 관리 / 파일 시스템 관리 / 입·출력 관리"}, {"num": 22, "g": "1", "th": "1E", "title": "UNIX - 쉘(Shell)", "front": "UNIX 쉘(Shell)의 역할은?", "back": "사용자 명령어를 인식해 프로그램을 호출·수행하는 '명령어 해석기'. 시스템과 사용자 간 인터페이스를 담당한다."}, {"num": 23, "g": "1", "th": "1E", "title": "UNIX의 주요 명령어", "front": "cat / chmod / chown / exec / fork / ls 명령어의 기능은?", "back": "cat: 파일 내용 화면 표시 / chmod: 파일 보호 모드(사용 허가) 설정 / chown: 소유자 변경 / exec: 새 프로세스 수행 / fork: 새 프로세스 생성 / ls: 디렉터리 내 파일 목록 확인"}, {"num": 24, "g": "1", "th": "1F", "title": "비동기식 전송", "front": "비동기식 전송의 특징은?", "back": "시작 비트와 정지 비트를 붙여 전송. 문자와 문자 사이의 휴지 시간이 불규칙하다."}, {"num": 25, "g": "1", "th": "1F", "title": "해밍 코드(Hamming Code)", "front": "해밍 코드의 특징과 패리티 비트 위치는?", "back": "수신 측에서 오류 비트를 검출 후 직접 수정하는 방식. 1비트 오류만 수정 가능.\n[보충] 패리티 비트는 2의 거듭제곱 위치(1,2,4,8…)에 배치된다."}, {"num": 26, "g": "1", "th": "1F", "title": "통신 프로토콜", "front": "통신 프로토콜의 정의는?", "back": "서로 다른 기기들 간의 데이터 교환을 정확하고 원활하게 수행하도록 표준화한 통신 규약."}, {"num": 27, "g": "1", "th": "1F", "title": "OSI 7계층 (1→7)", "front": "OSI 7계층을 1계층부터 순서대로 나열하면?", "back": "물리 → 데이터 링크 → 네트워크 → 전송 → 세션 → 표현 → 응용\n암기 두문자: 물·데·네·전·세·표·응"}, {"num": 28, "g": "1", "th": "1F", "title": "OSI 7계층의 주요 계층", "front": "데이터 링크·네트워크·전송 계층의 역할은?", "back": "데이터 링크: 신뢰성 있는 정보 전송 위해 시스템 간 연결 설정·유지·종료 / 네트워크: 네트워크 연결 관리, 데이터 교환·중계 / 전송: 종단 시스템 간 투명한 데이터 전송"}, {"num": 29, "g": "1", "th": "1F", "title": "X.25의 계층 구조", "front": "X.25의 3계층 구조는?", "back": "물리 계층 / 프레임 계층 / 패킷 계층"}, {"num": 30, "g": "1", "th": "1G", "title": "TCP/IP 계층별 주요 프로토콜", "front": "TCP/IP 4계층별 대표 프로토콜은?", "back": "응용: TELNET, FTP, SMTP, SNMP / 전송: TCP, UDP / 인터넷: IP, ICMP, IGMP, ARP, RARP / 네트워크 액세스: Ethernet, IEEE 802, HDLC, X.25, RS-232C"}, {"num": 31, "g": "1", "th": "1G", "title": "경로 제어(라우팅) 프로토콜", "front": "거리 벡터 방식과 링크 상태 방식의 프로토콜은?", "back": "종류: RIP, OSPF, EGP, BGP, EIGRP\n거리 벡터 방식: RIP, EIGRP, BGP / 링크 상태 방식: OSPF"}, {"num": 32, "g": "1", "th": "1G", "title": "패킷 교환 방식", "front": "패킷 교환 방식의 특징은?", "back": "메시지를 일정 길이 패킷으로 잘라 전송. 데이터 전송에 적합 / 장애 시 다른 경로로 우회 가능 / 대량 데이터 전송 시 전송 지연 증가"}, {"num": 33, "g": "1", "th": "1G", "title": "고속 이더넷", "front": "고속 이더넷(100BASE-T)의 특징은?", "back": "이더넷의 고속 버전(100BASE-T). CSMA/CD 사용, UTP 케이블로 100Mbps 전송."}, {"num": 34, "g": "1", "th": "1G", "title": "IPv6 주소", "front": "IPv6 주소의 구성과 특징은?", "back": "16비트씩 8부분, 총 128비트. 각 부분을 16진수로 표현하고 콜론(:)으로 구분. 인증성·기밀성·무결성 지원, 확장성·융통성·연동성 우수."}, {"num": 35, "g": "1", "th": "1H", "title": "소프트웨어 공학의 기본 원칙", "front": "소프트웨어 공학의 기본 원칙 3가지는?", "back": "현대적 프로그래밍 기술을 계속 적용 / 품질이 유지되도록 지속적으로 검증 / 개발 관련 사항·결과에 대한 명확한 기록 유지"}, {"num": 36, "g": "1", "th": "1H", "title": "폭포수 모형", "front": "폭포수 모형의 특징은?", "back": "이전 단계로 돌아갈 수 없다는 전제로 각 단계를 매듭짓고 다음 단계 진행 / 보헴이 제시한 고전적 생명주기 모형 / 요구사항 반영이 어려움"}, {"num": 37, "g": "1", "th": "1H", "title": "나선형 모형", "front": "나선형 모형의 반복 과정 4단계는?", "back": "점진적으로 완벽한 최종 SW를 개발. '계획 수립 → 위험 분석 → 개발 및 검증 → 고객 평가'가 반복 수행됨"}, {"num": 38, "g": "1", "th": "1H", "title": "애자일 개발 4가지 핵심 가치", "front": "애자일 4가지 핵심 가치는?", "back": "① 프로세스·도구보다 개인과 상호작용 ② 방대한 문서보다 실행되는 SW ③ 계약 협상보다 고객과 협업 ④ 계획을 따르기보다 변화에 반응"}, {"num": 39, "g": "1", "th": "1H", "title": "XP의 핵심 가치", "front": "XP(eXtreme Programming)의 핵심 가치 5가지는?", "back": "의사소통(Communication) / 단순성(Simplicity) / 용기(Courage) / 존중(Respect) / 피드백(Feedback)\n암기 두문자: 의·단·용·존·피"}, {"num": 40, "g": "1", "th": "1I", "title": "자료 흐름도(DFD)의 구성 요소", "front": "자료 흐름도의 4가지 구성 요소는?", "back": "프로세스(Process) / 자료 흐름(Data Flow) / 자료 저장소(Data Store) / 단말(Terminator)"}, {"num": 41, "g": "1", "th": "1I", "title": "자료 사전(DD)의 표기 기호", "front": "자료 사전의 표기 기호(=, +, (), [|], {}, **)의 의미는?", "back": "= : 정의 / + : 연결 / ( ) : 생략 / [ | ] : 선택 / { } : 반복 / ** : 설명"}, {"num": 42, "g": "1", "th": "1I", "title": "UML", "front": "UML의 정의와 구성 요소는?", "back": "개발자-고객-개발자 상호 간 의사소통을 위해 표준화한 대표적 객체지향 모델링 언어. 구성 요소: 사물(Things), 관계(Relationships), 다이어그램(Diagram)"}, {"num": 43, "g": "1", "th": "1I", "title": "UML의 주요 관계", "front": "일반화·의존·실체화 관계의 의미는?", "back": "일반화(Generalization): 사물이 더 일반적/구체적인지 표현 / 의존(Dependency): 짧은 시간 동안만 연관 유지 / 실체화(Realization): 기능으로 서로 그룹화할 수 있는 관계"}, {"num": 44, "g": "1", "th": "1I", "title": "소프트웨어 아키텍처 뷰의 종류", "front": "소프트웨어 아키텍처 뷰 5가지는?", "back": "유스케이스(Use Case) 뷰 / 논리적(Logical) 뷰 / 구현(Implementation) 뷰 / 프로세스(Process) 뷰 / 배포(Deployment) 뷰"}, {"num": 45, "g": "1", "th": "1J", "title": "파이프-필터 패턴", "front": "파이프-필터 패턴이란?", "back": "각 단계를 필터 컴포넌트로 캡슐화하여 파이프를 통해 데이터를 전송하는 패턴. 서브 시스템이 입력을 받아 처리 후 다음 서브 시스템으로 넘기는 과정을 반복."}, {"num": 46, "g": "1", "th": "1J", "title": "메소드(Method)", "front": "메소드란?", "back": "객체가 메시지를 받아 실행해야 할 때 객체의 구체적인 연산을 정의한 것."}, {"num": 47, "g": "1", "th": "1J", "title": "클래스(Class)", "front": "클래스와 인스턴스의 관계는?", "back": "클래스: 공통된 속성과 연산을 갖는 객체의 집합. 클래스에 속한 각각의 객체를 인스턴스(Instance)라 한다."}, {"num": 48, "g": "1", "th": "1J", "title": "추상 클래스", "front": "추상 클래스의 특징은?", "back": "구체 클래스에서 구현하려는 기능들의 공통점만 모아 추상화한 클래스. 인스턴스 생성이 불가능하다."}, {"num": 49, "g": "1", "th": "1J", "title": "캡슐화(Encapsulation)", "front": "캡슐화의 정의와 장점은?", "back": "데이터와 데이터를 처리하는 함수를 하나로 묶는 것. 외부 모듈 변경으로 인한 파급 효과가 적고, 재사용이 용이하다."}, {"num": 50, "g": "1", "th": "1J", "title": "상속(Inheritance)", "front": "상속이란?", "back": "이미 정의된 상위 클래스의 모든 속성과 연산을 하위 클래스가 물려받는 것."}, {"num": 51, "g": "1", "th": "1J", "title": "럼바우(Rumbaugh)의 분석 기법", "front": "럼바우 분석의 3가지 모델링은?", "back": "객체(Object) 모델링=정보 모델링, 객체 다이어그램 / 동적(Dynamic) 모델링=상태 다이어그램 / 기능(Functional) 모델링=자료 흐름도\n암기 두문자: 객·동·기"}, {"num": 52, "g": "1", "th": "1J", "title": "생성 패턴 - 빌더(Builder)", "front": "빌더 패턴의 특징은?", "back": "인스턴스를 건축하듯 조합하여 객체를 생성. 객체의 생성 과정과 표현 방법을 분리한다."}, {"num": 53, "g": "1", "th": "1J", "title": "생성 패턴 - 프로토타입(Prototype)", "front": "프로토타입 패턴의 특징은?", "back": "원본 객체를 복제하는 방법으로 객체를 생성. 생성 비용이 큰 경우 주로 이용."}, {"num": 54, "g": "1", "th": "1J", "title": "생성 패턴 - 싱글톤(Singleton)", "front": "싱글톤 패턴의 특징은?", "back": "생성된 객체를 어디서든 참조 가능하지만 여러 프로세스가 동시에 참조할 수는 없음. 불필요한 메모리 낭비를 최소화."}, {"num": 55, "g": "1", "th": "1J", "title": "구조 패턴 - 데코레이터(Decorator)", "front": "데코레이터 패턴의 특징은?", "back": "객체 간 결합으로 능동적으로 기능을 확장하는 패턴. 객체에 부가 기능을 추가하기 위해 다른 객체들을 덧붙이는 방식."}, {"num": 56, "g": "1", "th": "1K", "title": "화이트박스 테스트", "front": "화이트박스 테스트란?", "back": "원시 코드의 논리적인 모든 경로를 테스트해 테스트 케이스를 설계. 모든 문장을 한 번 이상 실행함으로써 수행됨."}, {"num": 57, "g": "1", "th": "1K", "title": "화이트박스 테스트 - 루프 검사", "front": "루프 검사의 반복 구조 4가지는?", "back": "단순 루프 / 중첩 루프 / 연결 루프 / 비구조적 루프"}, {"num": 58, "g": "1", "th": "1K", "title": "화이트박스 테스트의 종류", "front": "화이트박스 테스트의 종류는?", "back": "기초 경로 검사 / 제어 구조 검사(조건 검사, 루프 검사, 데이터 흐름 검사)"}, {"num": 59, "g": "1", "th": "1K", "title": "블랙박스 테스트 종류", "front": "블랙박스 테스트의 종류 5가지는?", "back": "동치 분할 검사 / 경계값 분석 / 원인-효과 그래프 검사 / 오류 예측 검사 / 비교 검사"}, {"num": 60, "g": "1", "th": "1K", "title": "소프트웨어 테스트 순서", "front": "소프트웨어 테스트 4단계 순서는?", "back": "단위 테스트 → 통합 테스트 → 시스템 테스트 → 인수 테스트\n암기 두문자: 단·통·시·인"}, {"num": 61, "g": "1", "th": "1K", "title": "단위 테스트", "front": "단위 테스트의 특징은?", "back": "모듈/컴포넌트에 초점을 맞춰 테스트. 사용자 요구사항 기반 기능성 테스트를 최우선으로 수행."}, {"num": 62, "g": "1", "th": "1K", "title": "통합 테스트", "front": "통합 테스트의 정의와 종류는?", "back": "단위 테스트가 끝난 모듈을 통합하는 과정의 오류·결함을 찾는 기법. 종류: 하향식, 상향식, 혼합식 통합 테스트."}, {"num": 63, "g": "1", "th": "1L", "title": "사용자 인터페이스의 특징", "front": "사용자 인터페이스(UI)의 특징은?", "back": "사용자의 편리성·가독성을 높임 / 작업 시간 단축 / 업무 이해도를 높임 / 사용자 중심으로 설계됨"}, {"num": 64, "g": "1", "th": "1L", "title": "사용자 인터페이스의 구분", "front": "CLI / GUI / NUI의 차이는?", "back": "CLI: 명령과 출력이 텍스트 형태 / GUI: 아이콘·메뉴를 마우스로 선택하는 그래픽 환경 / NUI: 사용자의 말·행동으로 기기를 조작"}, {"num": 65, "g": "1", "th": "1L", "title": "형상 관리", "front": "형상 관리의 정의와 관리 항목은?", "back": "소프트웨어 변경 사항을 관리하기 위한 일련의 활동. 관리 항목: 소스 코드, 프로젝트 계획, 분석서, 설계서, 지침서, 프로그램, 테스트 케이스 등"}, {"num": 66, "g": "1", "th": "1L", "title": "빌드 자동화 도구", "front": "빌드 자동화 도구의 정의와 종류는?", "back": "빌드를 포함해 테스트·배포를 자동화하는 도구. 종류: Ant, Make, Maven, Gradle, Jenkins 등"}, {"num": 67, "g": "2", "th": "2A", "title": "C/C++ 데이터 타입과 크기", "front": "char, int, float, double의 크기는?", "back": "char 1Byte / short 2Byte / int 4Byte / unsigned short 2Byte / unsigned int 4Byte / float 4Byte / double 8Byte"}, {"num": 68, "g": "2", "th": "2A", "title": "변수명 작성 규칙", "front": "변수명 작성 규칙 3가지는?", "back": "① 첫 글자로 숫자는 올 수 없다 ② 공백·특수문자(*,+,-,/ 등) 사용 불가 ③ 예약어를 변수명으로 사용 불가"}, {"num": 69, "g": "2", "th": "2A", "title": "상수의 생성", "front": "C언어에서 상수를 만들 때 쓰는 예약어는?", "back": "const 또는 #define"}, {"num": 70, "g": "2", "th": "2A", "title": "외부 변수", "front": "외부 변수(external variable)의 특징은?", "back": "변수나 함수를 참조(reference)하기 위한 변수. 함수가 종료된 뒤에도 값이 소멸되지 않는다."}, {"num": 71, "g": "2", "th": "2B", "title": "산술 연산자", "front": "% 연산자와 증감(++/--) 전치·후치의 차이는?", "back": "% : 나머지(정수만 가능, 실수 사용 시 오류) / 전치(++a): 먼저 증감 후 연산 / 후치(a++): 먼저 연산 후 증감"}, {"num": 72, "g": "2", "th": "2B", "title": "관계 연산자", "front": "관계 연산자 ==, !=, >, >=, <, <=의 의미는?", "back": "== 같다 / != 같지 않다 / > 크다 / >= 크거나 같다 / < 작다 / <= 작거나 같다"}, {"num": 73, "g": "2", "th": "2B", "title": "비트 연산자", "front": "& , ^ , | , ~ , << , >> 의 의미는?", "back": "&(and): 모두 1일 때 1 / ^(xor): 같으면 0 다르면 1 / |(or): 하나라도 1이면 1 / ~(not): 비트 부정 / <<: 왼쪽 시프트 / >>: 오른쪽 시프트"}, {"num": 74, "g": "2", "th": "2B", "title": "논리 연산자", "front": "! , && , || 의 의미는?", "back": "!(not): 부정 / &&(and): 모두 참이면 참 / ||(or): 하나라도 참이면 참"}, {"num": 75, "g": "2", "th": "2B", "title": "조건 연산자", "front": "조건(삼항) 연산자의 동작은? mx = a<b ? b : a;", "back": "조건에 따라 다른 수식 수행. a<b가 참이면 mx=b, 거짓이면 mx=a (즉 큰 값 저장)"}, {"num": 76, "g": "2", "th": "2B", "title": "연산자 우선순위", "front": "연산자 우선순위(높음→낮음)는?", "back": "단항 → 산술(*,/,% 다음 +,-) → 시프트 → 관계 → 비트(& ^ |) → 논리(&& ||) → 조건(삼항) → 대입 → 순서(,)"}, {"num": 77, "g": "2", "th": "2C", "title": "scanf() 함수", "front": "scanf()의 역할은? scanf(\"%d %f\", &i, &j);", "back": "키보드 입력을 변수에 저장. 정수를 i에, 실수를 j에 저장. 변수 앞에 번지 연산자 & 필요"}, {"num": 78, "g": "2", "th": "2C", "title": "주요 서식 문자열", "front": "%d %o %x %c %s %f 의 의미는?", "back": "%d 10진수 / %o 8진수 / %x 16진수 / %c 문자 / %s 문자열 / %f 실수(소수점 포함)"}, {"num": 79, "g": "2", "th": "2C", "title": "printf() 함수", "front": "printf()의 역할은?", "back": "인수로 주어진 값을 화면에 출력하는 함수"}, {"num": 80, "g": "2", "th": "2C", "title": "주요 제어문자", "front": "\\n \\t \\r \\0 \\b \\a 의 의미는?", "back": "\\n 다음 줄로 / \\t 일정 간격 띄움 / \\r 현재 줄 처음으로 / \\0 널 문자 / \\b 왼쪽 한 칸 / \\a 벨 소리"}, {"num": 81, "g": "2", "th": "2C", "title": "Java의 표준 출력", "front": "print / println / printf 의 차이는?", "back": "print: 그대로 출력 / println: 출력 후 커서를 다음 줄 처음으로 이동 / printf: 서식 지정 출력"}, {"num": 82, "g": "2", "th": "2C", "title": "기타 표준 입·출력 함수", "front": "getchar/gets/putchar/puts의 기능은?", "back": "getchar: 한 문자 입력 / gets: 문자열 입력 / putchar: 한 문자 출력 / puts: 문자열 출력 후 자동 줄바꿈"}, {"num": 83, "g": "2", "th": "2C", "title": "파일 입력 함수", "front": "fscanf/fgetc/fgets의 기능은?", "back": "fscanf: 파일에서 데이터를 지정 자료형으로 변수에 저장 / fgetc: 파일에서 한 문자 입력 / fgets: 파일에서 문자열 입력"}, {"num": 84, "g": "2", "th": "2D", "title": "단순 if문", "front": "if문과 if~else문의 차이는?", "back": "if: 조건이 참일 때만 실행 / if~else: 참일 때와 거짓일 때 실행 문장이 다름"}, {"num": 85, "g": "2", "th": "2D", "title": "switch문", "front": "switch문의 특징과 break 생략 시 동작은?", "back": "분기할 곳이 여러 곳일 때 사용. break가 생략되면 일치하는 case부터 break/종료까지 모든 문장이 실행됨"}, {"num": 86, "g": "2", "th": "2D", "title": "for문", "front": "for문의 구성은? for(i=1;i<=10;i++)", "back": "초기값·최종값(조건)·증가값을 지정해 정해진 횟수를 반복. 예: i가 1부터 1씩 증가하며 10 이하 동안 반복"}, {"num": 87, "g": "2", "th": "2D", "title": "while문", "front": "while문의 동작은?", "back": "조건이 참인 동안 실행할 문장을 반복 수행"}, {"num": 88, "g": "2", "th": "2D", "title": "do~while문", "front": "do~while문의 특징은?", "back": "실행할 문장을 무조건 한 번 실행한 다음 조건을 판단해 탈출 여부 결정(최소 1회 실행 보장)"}, {"num": 89, "g": "2", "th": "2E", "title": "1차원 배열", "front": "1차원 배열이란? char a[3]={'A','B','C'};", "back": "변수들을 일직선상으로 조합한 배열. a[0]=A, a[1]=B, a[2]=C (첨자는 0부터)"}, {"num": 90, "g": "2", "th": "2E", "title": "2차원 배열", "front": "2차원 배열이란? int b[2][3]", "back": "변수들을 행과 열로 조합한 배열. 2개 행, 3개 열. b[0][0]=11 … b[1][2]=66"}, {"num": 91, "g": "2", "th": "2E", "title": "배열 형태의 문자열 변수", "front": "배열에 문자열 저장 시 특징은? char a[5]=\"love\";", "back": "큰따옴표로 묶인 글자는 문자열로 처리. 문자열 끝에 널 문자('\\0')가 자동 삽입됨 → a[4]='\\0'"}, {"num": 92, "g": "2", "th": "2E", "title": "포인터와 포인터 변수", "front": "* 와 & 의 역할은?", "back": "선언 시 * (간접 연산자): int *a; / & (번지 연산자): 변수의 주소, a=&b; / 실행문 *a: a가 가리키는 곳의 값"}, {"num": 93, "g": "2", "th": "2E", "title": "포인터와 배열", "front": "배열명만 쓰면 무엇을 가리키나?", "back": "첨자를 생략하고 배열 대표명만 쓰면 첫 번째 요소의 주소와 같음. b=a; 와 b=&a[0]; 는 동일"}, {"num": 94, "g": "2", "th": "2F", "title": "사용자 정의 함수", "front": "사용자 정의 함수와 main()의 관계는?", "back": "사용자가 필요 기능을 직접 만든 함수. 모든 C 프로그램은 반드시 main() 함수에서 시작. return으로 값 반환"}, {"num": 95, "g": "2", "th": "2F", "title": "Python 기본 문법", "front": "Python 코드 블록과 문자열 따옴표 규칙은?", "back": "if·for 등 코드 블록은 콜론(:)과 여백(들여쓰기)으로 구분. 문자열에 따옴표가 포함되면 다른 따옴표로 묶음"}, {"num": 96, "g": "2", "th": "2F", "title": "Python input() 함수", "front": "input() 함수의 특징은?", "back": "키보드 입력을 변수에 저장. 입력값은 항상 '문자열'로 취급되어 저장됨"}, {"num": 97, "g": "2", "th": "2F", "title": "Python print() 함수", "front": "print(82,24,sep='-',end=',')의 결과는?", "back": "sep은 값 사이 분리문자, end는 마지막 종료문자. 결과: 82-24,"}, {"num": 98, "g": "2", "th": "2F", "title": "Range", "front": "range()의 기능은? list(range(1,15,3))", "back": "연속된 숫자 생성. range(1,15,3) → 1,4,7,10,13 (1부터 14까지 3씩 증가)"}, {"num": 99, "g": "2", "th": "2F", "title": "슬라이스", "front": "슬라이스 a[1:3], a[0:5:2], a[::3]의 의미는?", "back": "순차형 객체에서 일부를 잘라 반환. a[1:3]=인덱스1~2 / a[0:5:2]=0부터 2칸씩 / a[::3]=처음부터 3칸씩"}, {"num": 100, "g": "2", "th": "2F", "title": "Python for문", "front": "Python for문 두 가지 방식은?", "back": "① 리스트 이용: for i in a: / ② range 이용: for i in range(1,11): (1~10 반복)"}, {"num": 101, "g": "2", "th": "2F", "title": "Python 클래스", "front": "Python 클래스 사용 순서는?", "back": "클래스 이름 정하고 속성·메소드 정의 후 객체 선언. 메소드 첫 인자는 self. a=Cls() 로 객체 생성"}, {"num": 102, "g": "2", "th": "2G", "title": "HTML 프레임 태그", "front": "<frameset>과 <frame>의 역할은?", "back": "<frameset>: 화면 분할(rows/cols 속성으로 개수 지정) / <frame>: 분할된 각 프레임에 표시할 HTML 문서 지정. 가로분할=위→아래, 세로분할=왼→오"}, {"num": 103, "g": "2", "th": "2G", "title": "HTML 테이블 태그", "front": "<table><thead><tbody><tfoot><tr><td><th>의 역할은?", "back": "table 세부설정 / thead 머리글 / tbody 본문 / tfoot 바닥글 / tr 행 / td 셀 / th 제목 스타일 셀"}, {"num": 104, "g": "2", "th": "2G", "title": "HTML <style> 태그", "front": "<style> 태그와 선택자(first-child 등)는?", "back": "서식 지정 태그(<head>에 두면 전체 공통 적용). 선택자: first-child(첫), last-child(마지막), nth-child(N)(N번째마다). 속성은 세미콜론(;)으로 구분"}, {"num": 105, "g": "2", "th": "2G", "title": "HTML <form> 태그", "front": "<form>의 method(get/post)와 action은?", "back": "form: 정보 입력 틀. method get: 데이터를 URL에 첨부 전송 / post: 메시지 형식 전송 / action: 전송할 URL 지정"}, {"num": 106, "g": "2", "th": "2G", "title": "JavaScript document.write()", "front": "document.write()의 기능은?", "back": "가장 일반적인 출력 메소드. 인수로 준 데이터를 화면에 출력. document.write(\"Sinagong\")→화면에 Sinagong 출력"}, {"num": 107, "g": "2", "th": "2G", "title": "JavaScript 대화상자", "front": "alert / confirm / prompt의 차이는?", "back": "alert(내용): 확인 버튼 / confirm(내용): 확인+취소 / prompt(내용,기본값): 입력 텍스트 상자 + 확인·취소"}, {"num": 108, "g": "2", "th": "2G", "title": "JavaScript 배열 메소드", "front": "pop/push/join/shift/splice의 기능은?", "back": "pop: 마지막 요소 제거 / push: 마지막에 추가 / join: 모든 요소를 문자열로 / shift: 첫 요소 제거 / splice: 지정 범위 제거 후 값 저장"}, {"num": 109, "g": "2", "th": "2H", "title": "객체지향 언어 종류", "front": "JAVA / C++ / Smalltalk의 특징은?", "back": "JAVA: 분산 네트워크 환경, 캡슐화·재사용성 높음 / C++: C에 객체지향 개념 적용 / Smalltalk: 1세대 순수 객체지향 언어"}, {"num": 110, "g": "2", "th": "2H", "title": "객체지향 구성 요소", "front": "객체(Object)와 클래스(Class)란?", "back": "객체: 데이터(속성)와 처리 연산(메소드)을 결합한 실체 / 클래스: 두 개 이상의 유사 객체를 묶어 공통 특성을 표현하는 요소"}, {"num": 111, "g": "2", "th": "2H", "title": "객체지향 주요 특징", "front": "캡슐화·상속성의 의미는?", "back": "캡슐화: 데이터(속성)와 함수를 하나로 묶음 / 상속성: 상위 클래스의 모든 속성·연산을 하위 클래스가 물려받음"}, {"num": 112, "g": "2", "th": "2H", "title": "스크립트 언어 종류", "front": "자바스크립트/PHP/Python/쉘/Basic의 구분은?", "back": "자바스크립트: 클라이언트용(웹 동작 제어) / PHP: 서버용(Linux·Unix·Win) / Python: 귀도 반 로섬, 대화형 / 쉘 스크립트: 쉘 명령어 조합 / Basic: 절차지향 대화형 인터프리터"}, {"num": 113, "g": "2", "th": "2H", "title": "쉘 스크립트 제어문", "front": "쉘 스크립트의 선택형·반복형 제어문은?", "back": "선택형: if, case / 반복형: for, while, until"}, {"num": 114, "g": "2", "th": "2H", "title": "JavaScript 프레임워크 종류", "front": "jQuery/React/Angular/Node.js/Ember의 특징은?", "back": "jQuery: 호환성 해결·명령어 단순화 / React: 메타(Meta) 개발 / Angular: 구글 개발 / Node.js: 브라우저 밖에서도 JS 동작 / Ember: 웹앱용 다양한 기능"}, {"num": 115, "g": "2", "th": "2I", "title": "C 표준 라이브러리", "front": "math.h와 stdlib.h가 제공하는 것은?", "back": "math.h: 수학 함수(sqrt, pow, abs) / stdlib.h: 자료형 변환·난수·메모리 할당(atoi, atof, srand, rand, malloc, free)"}, {"num": 116, "g": "2", "th": "2I", "title": "try~catch 문", "front": "try~catch의 진행 순서와 finally 특징은?", "back": "예외 처리 명령문. 'try → 해당 예외 catch → finally' 순. finally는 예외 발생과 무관하게 무조건 수행(단, C++에서는 사용 불가)"}, {"num": 117, "g": "2", "th": "2I", "title": "프레임워크의 특성", "front": "프레임워크의 4가지 특성은?", "back": "모듈화 / 재사용성 / 확장성(다형성) / 제어의 역흐름(Inversion of Control: 객체 제어를 프레임워크에 넘김)"}, {"num": 118, "g": "2", "th": "2J", "title": "결합도(Coupling)", "front": "결합도의 종류를 약함→강함 순으로?", "back": "자료 < 스탬프 < 제어 < 외부 < 공통 < 내용. 결합도는 낮을수록(약할수록) 좋다. 두문자: 자·스·제·외·공·내"}, {"num": 119, "g": "2", "th": "2J", "title": "응집도(Cohesion)", "front": "응집도의 종류를 약함→강함 순으로?", "back": "우연 < 논리 < 시간 < 절차 < 교환 < 순차 < 기능. 응집도는 높을수록(강할수록) 좋다. 두문자: 우·논·시·절·교·순·기"}, {"num": 120, "g": "2", "th": "2J", "title": "재사용(Reuse)", "front": "재사용 규모에 따른 분류는?", "back": "이미 개발된 기능을 최적화해 재사용. 규모별 분류: 함수와 객체 → 컴포넌트 → 애플리케이션"}, {"num": 121, "g": "2", "th": "2J", "title": "효과적인 모듈 설계 방안", "front": "좋은 모듈 설계의 핵심은?", "back": "결합도는 줄이고 응집도는 높여 독립성·재사용성을 높임. 복잡도·중복성을 줄이고 일관성 유지"}, {"num": 122, "g": "2", "th": "2J", "title": "보안 취약점", "front": "보안 취약점(Security Vulnerability)이란?", "back": "기능·설계·구현 단계의 문제점 등으로 인해 시스템이 가지게 되는 약점"}, {"num": 123, "g": "2", "th": "2J", "title": "보안 3대 요소", "front": "보안 3대 요소는?", "back": "기밀성(인가된 사용자만 접근) / 무결성(인가된 사용자만 수정) / 가용성(인가된 사용자는 언제든 사용). 두문자: 기·무·가"}, {"num": 124, "g": "2", "th": "2J", "title": "API", "front": "API와 Open API란?", "back": "API: 라이브러리를 이용하도록 규칙을 정의한 인터페이스 / Open API: 누구나 무료로 사용하도록 공개된 API"}, {"num": 125, "g": "3", "th": "3A", "title": "자료 구조의 분류", "front": "선형 구조와 비선형 구조의 종류는?", "back": "선형 구조: 배열, 선형 리스트, 스택, 큐, 데크 / 비선형 구조: 트리, 그래프"}, {"num": 126, "g": "3", "th": "3A", "title": "스택(Stack)", "front": "스택의 특징은?", "back": "리스트의 한쪽 끝으로만 삽입·삭제가 이루어지는 자료 구조. 후입선출(LIFO) 방식"}, {"num": 127, "g": "3", "th": "3A", "title": "스택의 응용 분야", "front": "스택의 응용 분야는?", "back": "함수 호출 순서 제어 / 인터럽트 처리 / 수식 계산·표기법 / 언어 번역(컴파일러) / 서브루틴 호출 및 복귀주소 저장"}, {"num": 128, "g": "3", "th": "3A", "title": "스택 삽입(Push)·삭제(Pop)", "front": "PUSH와 POP의 의미는?", "back": "PUSH: 스택에 자료를 입력하는 명령 / POP: 스택에서 자료를 출력하는 명령"}, {"num": 129, "g": "3", "th": "3A", "title": "큐(Queue)", "front": "큐의 특징은?", "back": "한쪽에서 삽입, 다른 한쪽에서 삭제가 이루어지는 자료 구조. 선입선출(FIFO) 방식"}, {"num": 130, "g": "3", "th": "3A", "title": "데크(Deque)", "front": "데크의 특징과 입력/출력 제한은?", "back": "양쪽 끝에서 삽입·삭제가 모두 가능. 입력 제한 데크: 입력 한쪽·출력 양쪽 / 출력 제한 데크: 입력 양쪽·출력 한쪽"}, {"num": 131, "g": "3", "th": "3A", "title": "그래프의 최대 간선 수", "front": "무방향/방향 그래프의 최대 간선 수는?", "back": "무방향 그래프: n(n-1)/2 / 방향 그래프: n(n-1)"}, {"num": 132, "g": "3", "th": "3A", "title": "트리(Tree)", "front": "트리의 정의와 디그리·단말 노드는?", "back": "사이클을 이루지 않는 그래프의 특수 형태. 디그리(차수)=노드에서 뻗은 가지 수 / 단말(잎) 노드=디그리가 0인 노드"}, {"num": 133, "g": "3", "th": "3A", "title": "이진 트리의 운행법", "front": "Preorder·Inorder·Postorder 방문 순서 규칙은?", "back": "Preorder: Root→Left→Right / Inorder: Left→Root→Right / Postorder: Left→Right→Root"}, {"num": 134, "g": "3", "th": "3B", "title": "수식 표기법 Infix→Postfix", "front": "Infix를 Postfix로 바꾸는 방법은?", "back": "① 연산 우선순위대로 괄호로 묶는다 ② 연산자를 해당 괄호의 뒤(오른쪽)로 옮긴다 ③ 괄호를 제거한다"}, {"num": 135, "g": "3", "th": "3B", "title": "수식 표기법 Infix→Prefix", "front": "Infix를 Prefix로 바꾸는 방법은?", "back": "① 우선순위대로 괄호로 묶는다 ② 연산자를 해당 괄호의 앞(왼쪽)으로 옮긴다 ③ 괄호를 제거한다"}, {"num": 136, "g": "3", "th": "3B", "title": "수식 표기법 Postfix→Infix", "front": "Postfix를 Infix로 되돌리는 방법은?", "back": "① 인접한 피연산자 2개와 오른쪽 연산자를 괄호로 묶는다 ② 연산자를 두 피연산자의 가운데로 이동 ③ 필요없는 괄호 제거"}, {"num": 137, "g": "3", "th": "3C", "title": "삽입 정렬(Insertion Sort)", "front": "삽입 정렬의 원리는?", "back": "두 번째 값부터 앞의 정렬된 부분과 비교하여 알맞은 위치에 삽입하고 나머지를 뒤로 이동"}, {"num": 138, "g": "3", "th": "3C", "title": "선택 정렬(Selection Sort)", "front": "선택 정렬의 원리는?", "back": "회전마다 최소값(또는 최대값)을 찾아 해당 위치와 교환하는 방식"}, {"num": 139, "g": "3", "th": "3C", "title": "버블 정렬(Bubble Sort)", "front": "버블 정렬의 원리는?", "back": "인접한 두 값을 비교하여 자리를 교환하며, 한 회전마다 가장 큰 값이 맨 뒤로 이동"}, {"num": 140, "g": "3", "th": "3C", "title": "해시 테이블 관련 용어", "front": "Collision과 Synonym의 의미는?", "back": "Collision(충돌): 서로 다른 레코드가 같은 주소를 갖는 현상 / Synonym: 충돌로 같은 Home Address를 갖는 레코드들의 집합"}, {"num": 141, "g": "3", "th": "3C", "title": "해싱 함수(Hashing Function)", "front": "해싱 함수의 종류는?", "back": "제산법 / 제곱법 / 폴딩법 / 기수 변환법 / 대수적 코딩법 / 숫자(계수) 분석법 / 무작위법"}, {"num": 142, "g": "3", "th": "3D", "title": "DBMS의 필수 기능", "front": "DBMS의 3대 필수 기능은?", "back": "정의 기능(데이터 형·구조·제약조건 명시) / 조작 기능(검색·갱신·삽입·삭제 인터페이스) / 제어 기능(무결성 유지 제어)"}, {"num": 143, "g": "3", "th": "3D", "title": "데이터베이스 설계 순서", "front": "데이터베이스 설계 5단계 순서는?", "back": "요구 조건 분석 → 개념적 설계(E-R,개념스키마) → 논리적 설계(논리스키마) → 물리적 설계 → 구현(DDL로 생성)"}, {"num": 144, "g": "3", "th": "3D", "title": "물리적 설계 고려사항", "front": "물리적 설계 옵션 선택 시 고려 사항은?", "back": "반응 시간(Response Time) / 공간 활용도(Space Utilization) / 트랜잭션 처리량(Transaction Throughput)"}, {"num": 145, "g": "3", "th": "3D", "title": "데이터 모델에 표시할 요소", "front": "데이터 모델의 3요소는?", "back": "구조(Structure) / 연산(Operation) / 제약 조건(Constraint)"}, {"num": 146, "g": "3", "th": "3D", "title": "E-R 다이어그램", "front": "E-R 다이어그램 기호(사각형·마름모·타원·선)는?", "back": "사각형: 개체(Entity) / 마름모: 관계(Relationship) / 타원: 속성(Attribute) / 선(링크): 개체와 속성 연결"}, {"num": 147, "g": "3", "th": "3E", "title": "튜플(Tuple)", "front": "튜플이란? 카디널리티와의 관계는?", "back": "릴레이션을 구성하는 각각의 '행'. 튜플의 수 = 카디널리티(Cardinality)"}, {"num": 148, "g": "3", "th": "3E", "title": "속성(Attribute)", "front": "속성이란? 디그리와의 관계는?", "back": "데이터베이스를 구성하는 가장 작은 논리적 단위(열). 속성의 수 = 디그리(Degree) = 차수"}, {"num": 149, "g": "3", "th": "3E", "title": "도메인(Domain)", "front": "도메인이란?", "back": "하나의 애트리뷰트가 취할 수 있는 같은 타입의 원자(Atomic)값들의 집합"}, {"num": 150, "g": "3", "th": "3E", "title": "릴레이션의 특징", "front": "릴레이션의 특징 4가지는?", "back": "① 똑같은 튜플 포함 불가(모두 상이) ② 튜플 사이 순서 없음 ③ 속성 명칭은 유일 ④ 속성값은 더 쪼갤 수 없는 원자값"}, {"num": 151, "g": "3", "th": "3E", "title": "후보키(Candidate Key)", "front": "후보키의 조건은?", "back": "기본키로 사용할 수 있는 속성들의 부분집합. 유일성과 최소성을 모두 만족해야 함"}, {"num": 152, "g": "3", "th": "3E", "title": "널 값(NULL Value)", "front": "널 값(NULL)이란?", "back": "아직 알려지지 않았거나 모르는 값으로, 정보 부재를 나타내는 이론적으로 아무것도 없는 특수한 데이터"}, {"num": 153, "g": "3", "th": "3F", "title": "기본키(Primary Key)", "front": "기본키의 특징은?", "back": "후보키 중 특별히 선정된 주키(Main Key). 중복값을 가질 수 없고, NULL 값을 가질 수 없다"}, {"num": 154, "g": "3", "th": "3F", "title": "대체키(Alternate Key)", "front": "대체키란?", "back": "후보키가 둘 이상일 때 기본키를 제외한 나머지 후보키. 보조키라고도 함"}, {"num": 155, "g": "3", "th": "3F", "title": "슈퍼키(Super Key)", "front": "슈퍼키의 특징은?", "back": "한 릴레이션 내 속성들의 집합으로 구성된 키. 유일성은 만족하지만 최소성은 만족하지 못함"}, {"num": 156, "g": "3", "th": "3F", "title": "외래키(Foreign Key)", "front": "외래키란?", "back": "다른 릴레이션의 기본키를 참조하는 속성(또는 속성들의 집합). 참조 릴레이션의 기본키와 동일 도메인"}, {"num": 157, "g": "3", "th": "3F", "title": "무결성", "front": "개체 무결성과 참조 무결성의 규정은?", "back": "개체 무결성: 기본키를 구성하는 속성은 Null·중복값 불가 / 참조 무결성: 외래키는 Null이거나 참조 릴레이션의 기본키 값과 동일해야 함"}, {"num": 158, "g": "3", "th": "3G", "title": "관계대수", "front": "관계대수의 특징은?", "back": "원하는 정보와 그것을 '어떻게' 유도하는가를 기술하는 절차적 언어. 연산 순서를 명시함"}, {"num": 159, "g": "3", "th": "3G", "title": "순수 관계 연산자 Select", "front": "Select 연산과 기호는?", "back": "선택 조건을 만족하는 튜플의 부분집합(행)을 구함. 기호: 시그마(σ)"}, {"num": 160, "g": "3", "th": "3G", "title": "순수 관계 연산자 Project", "front": "Project 연산과 기호는?", "back": "속성 리스트에 제시된 속성 값(열)만 추출. 기호: 파이(π)"}, {"num": 161, "g": "3", "th": "3G", "title": "순수 관계 연산자 Join", "front": "Join 연산과 기호는?", "back": "공통 속성을 중심으로 두 릴레이션을 하나로 합침. 기호: ⋈"}, {"num": 162, "g": "3", "th": "3G", "title": "순수 관계 연산자 Division", "front": "Division 연산과 기호는?", "back": "R의 속성이 S의 속성값을 모두 가진 튜플에서 S의 속성을 제외한 속성만 구함. 기호: ÷"}, {"num": 163, "g": "3", "th": "3G", "title": "일반 집합 연산자 기호", "front": "합집합·교집합·차집합·교차곱의 기호는?", "back": "합집합(UNION) ∪ / 교집합(INTERSECTION) ∩ / 차집합(DIFFERENCE) - / 교차곱(CARTESIAN PRODUCT) ×"}, {"num": 164, "g": "3", "th": "3G", "title": "교차곱(CARTESIAN PRODUCT)", "front": "교차곱의 디그리·카디널리티는?", "back": "두 릴레이션 튜플들의 순서쌍을 구함. 디그리=두 릴레이션 디그리의 합, 카디널리티=두 릴레이션 카디널리티의 곱"}, {"num": 165, "g": "3", "th": "3G", "title": "관계해석", "front": "관계해석의 특징은?", "back": "코드(Codd)가 술어 해석(Predicate Calculus)에 기반해 제안. 원하는 정보가 '무엇'인지만 정의하는 비절차적 특성"}, {"num": 166, "g": "3", "th": "3H", "title": "정규화(Normalization)", "front": "정규화란?", "back": "함수적 종속성 등을 이용해 잘못 설계된 스키마를 더 작은 속성 세트로 쪼개 바람직하게 만드는 과정. 데이터 삽입 시 재구성 필요성을 줄임"}, {"num": 167, "g": "3", "th": "3H", "title": "이상(Anomaly)", "front": "이상(Anomaly)의 종류는?", "back": "정규화를 안 하면 중복으로 인해 발생하는 곤란한 현상. 종류: 삽입 이상, 삭제 이상, 갱신 이상"}, {"num": 168, "g": "3", "th": "3H", "title": "정규화 과정", "front": "1NF→5NF 정규화 과정 순서는?", "back": "비정규→(도메인 원자값)1NF→(부분함수종속 제거)2NF→(이행함수종속 제거)3NF→(결정자면서 후보키 아닌 것 제거)BCNF→(다치종속 제거)4NF→(조인종속 이용)5NF"}, {"num": 169, "g": "3", "th": "3H", "title": "이행적 종속 관계", "front": "이행적 종속이란?", "back": "A→B이고 B→C일 때 A→C를 만족하는 관계"}, {"num": 170, "g": "3", "th": "3H", "title": "함수적 종속", "front": "함수적 종속이란?", "back": "데이터들이 어떤 기준값에 의해 종속되는 것. '학번→이름'처럼 학번이 결정되면 이름이 항상 대응됨"}, {"num": 171, "g": "3", "th": "3I", "title": "뷰(View)", "front": "뷰의 정의와 특징은?", "back": "하나 이상의 기본 테이블에서 유도된, 이름을 가지는 가상 테이블. 기본키를 포함해야 삽입·삭제·갱신 가능. 정의는 CREATE, 제거는 DROP"}, {"num": 172, "g": "3", "th": "3I", "title": "뷰의 장·단점", "front": "뷰의 장점과 단점은?", "back": "장점: 논리적 데이터 독립성, 접근 제어를 통한 자동 보안 / 단점: 독립적 인덱스 불가, 정의 변경 불가, 삽입·삭제·갱신 연산에 제약"}, {"num": 173, "g": "3", "th": "3I", "title": "시스템 카탈로그", "front": "시스템 카탈로그란?", "back": "시스템 관련 다양한 객체 정보를 포함하는 시스템 데이터베이스. 사용자는 검색은 가능하나 갱신은 불가"}, {"num": 174, "g": "3", "th": "3I", "title": "트랜잭션의 특성", "front": "트랜잭션의 특성(ACID)은?", "back": "Atomicity(원자성): 모두 반영(Commit) 또는 전혀 반영 안 됨(Rollback) / Consistency(일관성) / Isolation(독립성): 다른 트랜잭션이 끼어들 수 없음 / Durability(영속성): 고장나도 영구 반영"}, {"num": 175, "g": "3", "th": "3J", "title": "DDL(데이터 정의어)", "front": "DDL의 명령어는?", "back": "스키마·도메인·테이블·뷰·인덱스를 정의/변경/삭제. CREATE(정의), ALTER(변경), DROP(삭제)"}, {"num": 176, "g": "3", "th": "3J", "title": "DML(데이터 조작어)", "front": "DML의 명령어는?", "back": "저장된 데이터를 실질적으로 처리. SELECT(검색), INSERT(삽입), DELETE(삭제), UPDATE(변경)"}, {"num": 177, "g": "3", "th": "3J", "title": "DCL(데이터 제어어)", "front": "DCL의 명령어는?", "back": "보안·무결성·회복·병행제어 정의. COMMIT(저장 확정), ROLLBACK(복구), GRANT(권한 부여), REVOKE(권한 취소)"}, {"num": 178, "g": "3", "th": "3J", "title": "CREATE TABLE", "front": "CREATE TABLE의 주요 옵션은?", "back": "테이블 정의. PRIMARY KEY(기본키), UNIQUE(대체키), FOREIGN KEY~REFERENCES(외래키), NOT NULL, CHECK(조건식) 등"}, {"num": 179, "g": "3", "th": "3J", "title": "ALTER TABLE", "front": "ALTER TABLE의 3가지 동작은?", "back": "테이블 정의 변경. ADD(속성 추가), ALTER(기본값 설정), DROP COLUMN(속성 제거)"}, {"num": 180, "g": "3", "th": "3J", "title": "DROP TABLE", "front": "DROP TABLE의 CASCADE와 RESTRICT는?", "back": "테이블 제거. CASCADE: 참조하는 다른 개체까지 함께 제거 / RESTRICT: 참조 중이면 제거 취소"}, {"num": 181, "g": "3", "th": "3J", "title": "삽입문(INSERT INTO~)", "front": "INSERT문의 표기 형식은?", "back": "INSERT INTO 테이블명(속성명들) VALUES (데이터들); — 새로운 튜플 삽입"}, {"num": 182, "g": "3", "th": "3J", "title": "삭제문(DELETE FROM~)", "front": "DELETE문의 표기 형식은?", "back": "DELETE FROM 테이블명 [WHERE 조건]; — 특정 튜플(행) 삭제"}, {"num": 183, "g": "3", "th": "3J", "title": "갱신문(UPDATE~ SET~)", "front": "UPDATE문의 표기 형식은?", "back": "UPDATE 테이블명 SET 속성명=데이터 [WHERE 조건]; — 특정 튜플 내용 변경"}, {"num": 184, "g": "3", "th": "3K", "title": "데이터 조작문 4유형", "front": "SELECT·INSERT·DELETE·UPDATE의 기본 형식은?", "back": "SELECT~FROM~WHERE~ / INSERT INTO~VALUES~ / DELETE~FROM~WHERE~ / UPDATE~SET~WHERE~"}, {"num": 185, "g": "3", "th": "3K", "title": "Select문", "front": "SELECT문의 절 구성 순서는?", "back": "SELECT [DISTINCT] 속성 → FROM 테이블 → WHERE 조건 → GROUP BY → HAVING(그룹 조건) → ORDER BY(ASC 오름/DESC 내림)"}, {"num": 186, "g": "3", "th": "3K", "title": "조건 연산자 LIKE", "front": "LIKE의 대표 문자 %, _, #의 의미는?", "back": "% : 모든 문자 대표 / _ : 문자 하나 대표 / # : 숫자 하나 대표"}, {"num": 187, "g": "3", "th": "3K", "title": "그룹 함수", "front": "COUNT/SUM/AVG/MAX/MIN의 기능은?", "back": "GROUP BY 그룹별 집계. COUNT(튜플 수)/SUM(합계)/AVG(평균)/MAX(최대)/MIN(최소)"}, {"num": 188, "g": "3", "th": "3K", "title": "집합 연산자", "front": "집합 연산자란?", "back": "2개 이상의 테이블 데이터를 하나로 통합하는 연산자(UNION 등)"}, {"num": 189, "g": "3", "th": "3K", "title": "CROSS JOIN(교차 조인)", "front": "CROSS JOIN의 결과 행 수는?", "back": "두 테이블 튜플들의 순서쌍을 반환. 결과 행 수 = 두 테이블 행 수의 곱"}, {"num": 190, "g": "3", "th": "3K", "title": "테스트와 디버깅의 목적", "front": "테스트와 디버깅의 차이는?", "back": "테스트: 오류를 '발견' / 디버깅: 발견된 오류의 소스 코드를 추적하며 '수정'"}, {"num": 191, "g": "3", "th": "3L", "title": "프로시저(Procedure)", "front": "프로시저란?", "back": "절차형 SQL로 특정 기능을 수행하는 트랜잭션 언어. 호출을 통해 실행되어 미리 저장한 SQL 작업 수행"}, {"num": 192, "g": "3", "th": "3L", "title": "옵티마이저(Optimizer)", "front": "옵티마이저와 그 종류는?", "back": "SQL이 가장 효율적으로 수행되도록 최적 경로를 찾는 모듈. 종류: RBO(규칙 기반), CBO(비용 기반)"}, {"num": 193, "g": "3", "th": "3L", "title": "APM", "front": "APM이란?", "back": "애플리케이션 성능 관리를 위해 접속자·자원 현황·트랜잭션 내역·장애 진단 등 모니터링 기능을 제공하는 도구"}], "quiz": [{"id": "1-0", "g": "1", "th": "1A", "type": "객관식", "q": "운영체제의 목적(성능 평가 기준)이 아닌 것은?", "opts": ["처리 능력 향상", " const GKEYS = Object.keys(DATA.subjects);
function themeKeys(g){return Object.keys(DATA.themes).filter(function(k){return k.charAt(0)===g;});}
const LS='jbcsai_all_v1';
let store = JSON.parse(localStorage.getItem(LS) || '{}');
store.cards = store.cards || {}; store.quiz = store.quiz || {}; store.ui = store.ui || {};
function save(){localStorage.setItem(LS, JSON.stringify(store));}
let gSel = store.ui.g || '1';
let fcTheme='ALL', qTheme='ALL';

function renderGwa(){
  const bar=document.getElementById('gwabar'); bar.innerHTML='';
  GKEYS.forEach(function(g){
    const b=document.createElement('button'); b.className='gwa'+(g===gSel?' active':'');
    b.textContent=g+'과목'; b.onclick=function(){gSel=g;store.ui.g=g;save();fcTheme='ALL';qTheme='ALL';refreshAll();};
    bar.appendChild(b);
  });
  document.getElementById('gwaname').textContent=DATA.subjects[gSel];
}
function refreshAll(){renderGwa();loadFc();renderQuiz();renderNotes();renderDash();}

document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('active');});
  t.classList.add('active'); document.getElementById(t.dataset.p).classList.add('active');
  if(t.dataset.p==='dash') renderDash();
};});

function buildFilter(el,onPick,active){
  el.innerHTML='';
  el.appendChild(mk('전체','ALL'));
  themeKeys(gSel).forEach(function(k){el.appendChild(mk(k.substr(1)+'. '+DATA.themes[k],k));});
  function mk(label,val){const b=document.createElement('button');b.className='chip'+(val===active?' active':'');b.textContent=label;b.onclick=function(){onPick(val);};return b;}
}

let fcList=[], fcIdx=0, flipped=false;
function loadFc(){fcList=DATA.cards.filter(function(c){return c.g===gSel&&(fcTheme==='ALL'||c.th===fcTheme);});fcIdx=0;flipped=false;renderFc();}
function renderFc(){
  buildFilter(document.getElementById('fcFilter'),function(v){fcTheme=v;loadFc();},fcTheme);
  const c=fcList[fcIdx]; const card=document.getElementById('fcCard');
  if(!c){card.innerHTML='카드가 없습니다.';document.getElementById('fcProg').textContent='0 / 0';return;}
  const known=store.cards[c.num];
  const status=known===true?'<span style="color:var(--good)">✓ 안다</span>':known===false?'<span style="color:var(--bad)">✗ 모름</span>':'미평가';
  if(!flipped){card.innerHTML='<div class="tag">['+String(c.num).padStart(3,'0')+'] '+c.th.substr(1)+'. '+DATA.themes[c.th]+' · '+c.title+' · '+status+'</div><div class="q">'+esc(c.front)+'</div><div class="hint">카드를 누르면 정답이 보입니다</div>';}
  else{card.innerHTML='<div class="tag">['+String(c.num).padStart(3,'0')+'] '+c.title+'</div><div class="a">'+esc(c.back)+'</div>';}
  document.getElementById('fcProg').textContent=(fcIdx+1)+' / '+fcList.length+' 장';
}
function flip(){flipped=!flipped;renderFc();}
function nextCard(){if(fcIdx<fcList.length-1){fcIdx++;flipped=false;renderFc();}}
function prevCard(){if(fcIdx>0){fcIdx--;flipped=false;renderFc();}}
function markCard(ok){const c=fcList[fcIdx];if(!c)return;store.cards[c.num]=ok;save();nextCard();renderFc();}
document.getElementById('fcShuffle').onclick=function(){for(let i=fcList.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;const t=fcList[i];fcList[i]=fcList[j];fcList[j]=t;}fcIdx=0;flipped=false;renderFc();};

function renderQuiz(){
  buildFilter(document.getElementById('qFilter'),function(v){qTheme=v;renderQuiz();},qTheme);
  const list=document.getElementById('qList'); list.innerHTML='';
  DATA.quiz.forEach(function(q){
    if(q.g!==gSel)return; if(qTheme!=='ALL'&&q.th!==qTheme)return;
    const prev=store.quiz[q.id];
    const d=document.createElement('div'); d.className='q-item';
    let inner='<span class="q-type">'+q.th.substr(1)+'. '+DATA.themes[q.th]+' · '+q.type+'</span><div class="q-text">'+esc(q.q)+'</div>';
    if(q.type==='객관식'){inner+='<div>'+q.opts.map(function(o){return '<button class="opt" data-v="'+esc(o)+'">'+esc(o)+'</button>';}).join('')+'</div>';}
    else if(q.type==='OX'){inner+='<div class="oxrow"><button class="opt" data-v="O">⭕ O (맞다)</button><button class="opt" data-v="X">❌ X (틀리다)</button></div>';}
    else{inner+='<div><input class="blankin" placeholder="정답 입력 후 Enter"><button class="btn" style="margin-left:8px">확인</button></div>';}
    inner+='<div class="exp">정답: <b>'+esc(q.ans)+'</b> — '+esc(q.exp)+'</div>';
    d.innerHTML=inner; const exp=d.querySelector('.exp');
    function grade(val){
      const ok=val.trim().toLowerCase()===q.ans.trim().toLowerCase();
      store.quiz[q.id]=ok; save(); exp.classList.add('show');
      if(q.type==='빈칸'){exp.innerHTML='판정: '+(ok?'<b style="color:var(--good)">정답 ✓</b>':'<b style="color:var(--bad)">오답 ✗</b>')+' · 정답: <b>'+esc(q.ans)+'</b> — '+esc(q.exp);}
      d.querySelectorAll('.opt').forEach(function(b){if(b.dataset.v===q.ans)b.classList.add('correct');else if(b.dataset.v===val&&!ok)b.classList.add('wrong');b.disabled=true;});
      renderQuizProg();
    }
    d.querySelectorAll('.opt').forEach(function(b){b.onclick=function(){grade(b.dataset.v);};});
    const inp=d.querySelector('.blankin');
    if(inp){const btn=d.querySelector('.btn');btn.onclick=function(){grade(inp.value);};inp.onkeydown=function(e){if(e.key==='Enter')grade(inp.value);};}
    if(prev!==undefined){exp.classList.add('show');d.querySelectorAll('.opt').forEach(function(b){if(b.dataset.v===q.ans)b.classList.add('correct');b.disabled=true;});}
    list.appendChild(d);
  });
  renderQuizProg();
}
function renderQuizProg(){
  let answered=0,correct=0,total=0;
  DATA.quiz.forEach(function(q){if(q.g!==gSel)return;if(qTheme!=='ALL'&&q.th!==qTheme)return;total++;const p=store.quiz[q.id];if(p!==undefined){answered++;if(p)correct++;}});
  document.getElementById('qProg').textContent='풀이 '+answered+'/'+total+' · 정답 '+correct+' ('+(answered?Math.round(correct/answered*100):0)+'%)';
}
document.getElementById('qReset').onclick=function(){DATA.quiz.forEach(function(q){if(q.g===gSel&&(qTheme==='ALL'||q.th===qTheme))delete store.quiz[q.id];});save();renderQuiz();};

function renderNotes(){
  const b=document.getElementById('noteBody'); let h='';
  const mn=DATA.mnem.filter(function(m){return m.g===gSel;});
  const cp=DATA.comps.filter(function(c){return c.g===gSel;});
  const cl=DATA.calc.filter(function(c){return c.g===gSel;});
  h+='<div class="note"><h3>🔑 두문자·연상 암기법</h3>';
  if(!mn.length)h+='<div style="color:var(--mut);font-size:.85rem">이 과목에는 등록된 두문자 암기법이 없습니다.</div>';
  mn.forEach(function(m){h+='<div style="margin:10px 0;padding-bottom:10px;border-bottom:1px dashed var(--line)"><div class="mn-key">'+esc(m.key)+'</div><div style="font-size:.82rem;color:var(--mut)">['+String(m.num).padStart(3,'0')+'] '+esc(m.title)+'</div><div style="font-size:.9rem;margin-top:3px">'+esc(m.desc)+'</div></div>';});
  h+='</div>';
  h+='<div class="note"><h3>⚖️ 헷갈리는 개념 비교표</h3>';
  cp.forEach(function(c){h+='<h4 style="margin:14px 0 4px;font-size:.92rem">'+esc(c.title)+'</h4><div class="tablescroll"><table><tr>'+c.head.map(function(x){return '<th>'+esc(x)+'</th>';}).join('')+'</tr>'+c.rows.map(function(r){return '<tr>'+r.map(function(x){return '<td>'+esc(x)+'</td>';}).join('')+'</tr>';}).join('')+'</table></div>';});
  h+='</div>';
  h+='<div class="note"><h3>🧮 계산·풀이 단계</h3>';
  if(!cl.length)h+='<div style="color:var(--mut);font-size:.85rem">이 과목에는 등록된 계산 풀이가 없습니다.</div>';
  cl.forEach(function(c){h+='<h4 style="margin:14px 0 4px;font-size:.92rem">'+esc(c.title)+'</h4><div style="font-size:.85rem;color:var(--mut);margin-bottom:6px">'+esc(c.q)+'</div><ol class="steps">'+c.steps.map(function(s){return '<li>'+esc(s)+'</li>';}).join('')+'</ol><div class="ans-box">정답: '+esc(c.ans)+'</div>';});
  h+='</div>';
  b.innerHTML=h;
}

function renderDash(){
  const cardStat={},quizStat={}; const tks=themeKeys(gSel);
  tks.forEach(function(k){cardStat[k]={known:0,tot:0};quizStat[k]={correct:0,ans:0,tot:0};});
  DATA.cards.forEach(function(c){if(c.g!==gSel)return;cardStat[c.th].tot++;if(store.cards[c.num]===true)cardStat[c.th].known++;});
  DATA.quiz.forEach(function(q){if(q.g!==gSel)return;quizStat[q.th].tot++;const p=store.quiz[q.id];if(p!==undefined){quizStat[q.th].ans++;if(p)quizStat[q.th].correct++;}});
  let totK=0,totC=0,totAns=0,totCor=0,totQ=0;
  tks.forEach(function(k){totK+=cardStat[k].known;totC+=cardStat[k].tot;totAns+=quizStat[k].ans;totCor+=quizStat[k].correct;totQ+=quizStat[k].tot;});
  const weak=tks.filter(function(k){const a=quizStat[k];const acc=a.ans?a.correct/a.ans:0;const cpv=cardStat[k].known/cardStat[k].tot;return (a.ans>0&&acc<0.5)||cpv<0.5;}).map(function(k){return k.substr(1)+'. '+DATA.themes[k];});
  let ov='';
  GKEYS.forEach(function(g){let ck=0,ct=0,qa=0,qc=0;DATA.cards.forEach(function(c){if(c.g===g){ct++;if(store.cards[c.num]===true)ck++;}});DATA.quiz.forEach(function(q){if(q.g===g){const p=store.quiz[q.id];if(p!==undefined){qa++;if(p)qc++;}}});ov+='<div class="ovcard"><b>'+g+'과목</b><br>카드 '+Math.round(ck/ct*100)+'% · 퀴즈 '+(qa?Math.round(qc/qa*100):0)+'%</div>';});
  document.getElementById('dashSummary').innerHTML='<div style="font-size:1.05rem;font-weight:700;margin-bottom:6px">📊 '+DATA.subjects[gSel]+'</div><div style="font-size:.9rem">플래시카드 숙지: <b>'+totK+'/'+totC+'</b> ('+Math.round(totK/totC*100)+'%) · 퀴즈 정답률: <b>'+(totAns?Math.round(totCor/totAns*100):0)+'%</b> ('+totAns+'/'+totQ+')</div><div style="margin-top:8px;font-size:.88rem;color:var(--bad)">⚠ 우선 복습: '+(weak.length?weak.join(', '):'<span style="color:var(--good)">없음 — 잘하고 있어요!</span>')+'</div><div style="margin-top:10px;font-size:.8rem;color:var(--mut)">전 과목 요약</div><div class="ov">'+ov+'</div>';
  function color(p){return p>=0.8?'var(--good)':p>=0.5?'var(--warn)':'var(--bad)';}
  let hc='';
  tks.forEach(function(k){const s=cardStat[k];const p=s.tot?s.known/s.tot:0;hc+='<div class="dash-row"><div class="dash-name">'+k.substr(1)+'. '+DATA.themes[k]+'</div><div class="bar"><span style="width:'+Math.round(p*100)+'%;background:'+color(p)+'"></span><em>'+s.known+'/'+s.tot+'</em></div></div>';});
  document.getElementById('dashCards').innerHTML=hc;
  let hq='';
  tks.forEach(function(k){const s=quizStat[k];const p=s.ans?s.correct/s.ans:0;const label=s.ans?(s.correct+'/'+s.ans+' ('+Math.round(p*100)+'%)'):'미응시';hq+='<div class="dash-row"><div class="dash-name">'+k.substr(1)+'. '+DATA.themes[k]+'</div><div class="bar"><span style="width:'+(s.ans?Math.round(p*100):0)+'%;background:'+(s.ans?color(p):'var(--line)')+'"></span><em>'+label+'</em></div></div>';});
  document.getElementById('dashQuiz').innerHTML=hq;
}
document.getElementById('resetAll').onclick=function(){if(confirm('모든 과목의 학습 진도를 초기화할까요?')){store={cards:{},quiz:{},ui:{g:gSel}};save();refreshAll();}};
document.getElementById('ioExport').onclick=function(){
  const blob=new Blob([JSON.stringify(store)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const d=new Date();const stamp=d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2);
  a.download='정처산기_진도_'+stamp+'.json';a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
};
document.getElementById('ioImportBtn').onclick=function(){document.getElementById('ioImport').click();};
document.getElementById('ioImport').onchange=function(e){
  const file=e.target.files[0];if(!file)return;const rd=new FileReader();
  rd.onload=function(){try{const obj=JSON.parse(rd.result);if(!obj||typeof obj!=='object')throw 0;
    const mode=confirm('확인 = 불러온 진도로 [교체]\n취소 = 기존 진도와 [병합]');
    if(mode){store={cards:obj.cards||{},quiz:obj.quiz||{},ui:store.ui};}
    else{store.cards=Object.assign({},store.cards,obj.cards||{});store.quiz=Object.assign({},store.quiz,obj.quiz||{});}
    save();refreshAll();alert('진도를 불러왔습니다 ✓');
  }catch(err){alert('올바른 진도 파일이 아닙니다.');}};
  rd.readAsText(file);e.target.value='';
};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
refreshAll();
</script>
</body>
</html>
